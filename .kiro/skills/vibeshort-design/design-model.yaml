name: "VibeShort"
philosophy: "Immersive dark cinema. Deep blue-black canvas absorbs attention; vivid gradient tags signal content categories like neon signs in a dark theater. The tension: restrained darkness vs. explosive color moments."
primary_mode: "dark"
brand_domain: "short drama / video streaming entertainment"
brand_type: "ui-rich"
mono_for_code: false
mono_for_metrics: true

primitives:
  colors:
    neutral:
      50: "#FFFFFF"
      100: "#F0F1F5"
      200: "#CED0D6"
      300: "#C4C7D6"
      400: "#9F9FA2"
      500: "#8D9199"
      600: "#6E727A"
      700: "#6C7398"
      800: "#26282D"
      900: "#191A1E"
      950: "#141621"
      1000: "#050713"
    brand:
      50: "#E8EAFF"
      100: "#C7CCFF"
      200: "#A5ADFF"
      300: "#838EFF"
      400: "#6A74FF"
      500: "#5A68FF"
      600: "#4051FF"
      700: "#3040E6"
      800: "#2030CC"
      900: "#1020B3"
      950: "#0A1580"
    red:
      50: "#FFF0F0"
      400: "#FFB1B0"
      500: "#FF6164"
      600: "#FA5E7B"
      900: "#7F1D1D"
    green:
      50: "#E8FFF5"
      400: "#C8FFD8"
      500: "#0FFFE7"
      900: "#14532D"
    purple:
      50: "#FDF0FF"
      400: "#FBCBFF"
      500: "#F86DFF"
      600: "#D042FF"
      900: "#4A0066"
    amber:
      50: "#FFFBEB"
      500: "#FFB347"
      900: "#78350F"
  spacing: [0, 2, 4, 6, 8, 12, 16, 20, 24, 28, 32, 40, 48, 64, 96]
  radii: [0, 4, 8, 12, 20, 100, 999]

tokens:
  colors:
    dark:
      background: "{neutral.1000}"
      surface1: "{neutral.950}"
      surface2: "{neutral.900}"
      surface3: "{neutral.800}"
      border: "{neutral.950}"
      border_visible: "{neutral.800}"
      text1: "{neutral.50}"
      text2: "{neutral.200}"
      text3: "{neutral.500}"
      text4: "{neutral.600}"
      accent: "{brand.500}"
      accent_subtle: "{brand.950}"
    light:
      background: "{neutral.100}"
      surface1: "{neutral.50}"
      surface2: "{neutral.100}"
      surface3: "{neutral.200}"
      border: "{neutral.200}"
      border_visible: "{neutral.300}"
      text1: "{neutral.1000}"
      text2: "{neutral.600}"
      text3: "{neutral.500}"
      text4: "{neutral.400}"
      accent: "{brand.500}"
      accent_subtle: "{brand.50}"
    success: "{green.500}"
    warning: "{amber.500}"
    error: "{red.500}"
    tag_hot: "linear-gradient(270deg, #FF6164 0%, #FFB1B0 100%)"
    tag_new: "linear-gradient(270deg, #0FFFE7 0%, #C8FFD8 100%)"
    tag_exclusive: "linear-gradient(270deg, #F86DFF 0%, #FBCBFF 100%)"
    tag_brand: "linear-gradient(-90deg, #CECECE 0%, #6A74FF 100%)"

  spacing:
    2xs: 2
    xs: 4
    sm: 8
    md: 12
    lg: 16
    xl: 20
    2xl: 24
    3xl: 32
    4xl: 40
    5xl: 48
    6xl: 64

  radii:
    element: 4
    control: 8
    component: 12
    container: 20
    pill: 100
    full: 999

  typography:
    display:
      family: "Lexend Deca"
      size: "28px"
      weight: 300
      line_height: 1.4
      text_case: "title"
    h1:
      family: "Lexend Deca"
      size: "24px"
      weight: 600
      line_height: 1.33
    h2:
      family: "Lexend Deca"
      size: "20px"
      weight: 400
      line_height: 1.4
      text_case: "title"
    h3:
      family: "Montserrat"
      size: "14px"
      weight: 700
      line_height: 1.43
    body:
      family: "Montserrat"
      size: "12px"
      weight: 500
      line_height: 1.33
    body_sm:
      family: "Lexend Deca"
      size: "12px"
      weight: 300
      line_height: 1.33
      text_case: "title"
    caption:
      family: "Montserrat"
      size: "10px"
      weight: 600
      line_height: 1.6
    label:
      family: "Montserrat"
      size: "8px"
      weight: 800
      line_height: 1.5
      text_case: "uppercase"
      italic: true
    tag:
      family: "Lexend Deca"
      size: "9px"
      weight: 500
      line_height: 1.56
    logo:
      family: "Lexend Deca"
      size: "24px"
      weight: 400
      line_height: 1.33

  elevation:
    strategy: "glass"
    glass_blur: "40px"
    glass_opacity: 0.76
    glass_bg: "rgba(20, 22, 33, 0.12)"
    shadow_glow: "0px 1px 6px 0px rgba(127, 115, 255, 0.85)"

  motion:
    personality: "smooth"
    easing: "cubic-bezier(0.4, 0, 0.2, 1)"
    duration_fast: "150ms"
    duration_normal: "250ms"
    duration_slow: "400ms"

  hero_stage:
    preset: "luminous-on-gradient"
    observed_style:
      description: "Full-bleed banner with drama poster imagery, overlaid with gradient scrims (top and bottom) fading to the deep blue-black background. A luminous brand gradient accent appears as a glow element."
      where_used: ["hero banner", "feature sections"]
    background:
      medium: "gradient"
      color_mode: "dual-tone"
      saturation: "muted"
      light_source: "center"
      falloff: "soft"
      vignette: "subtle"
      texture: "clean"
      motion: "static"
      intensity: "subtle"
      safe_zone: "masked-for-text"
      color_palette: ["#4051FF", "#5A68FF", "#CECECE", "#050713"]
    hero:
      subject: "none"
    relation:
      type: "flat"
      bleed: 0
    disclaimer: "Hero uses gradient overlays on poster imagery. Actual drama posters are proprietary content."

  iconography:
    observed_style:
      description: "Custom filled icons at 24px with rounded forms. Play, search, arrow, subscribe icons. Solid fill style, geometric construction, minimal detail."
      stroke_weight: "filled"
      corner_treatment: "soft"
      fill_style: "solid"
      form_language: "geometric"
      visual_density: "minimal"
    fallback_kit:
      name: "Phosphor"
      weight: "fill"
      match_score: "high"
      match_reasoning: "VibeShort uses filled geometric icons with soft corners. Phosphor fill matches the solid style and geometric construction. Material Symbols would be second choice but reads too Android-specific for this entertainment brand."
      cdn: "https://unpkg.com/@phosphor-icons/web@2/src/fill/style.css"
      icon_class_prefix: "ph-fill ph-"
    disclaimer: "Icons in the generated preview are from the Phosphor fill kit. The brand's actual icons are proprietary."

components:
  banner_card:
    source: "observed"
    background: "image"
    border_radius: "{radii.container}"
    overlay_top: "linear-gradient(180deg, rgba(5,7,19,1) 18%, rgba(5,7,19,0.75) 59%, rgba(5,7,19,0) 100%)"
    overlay_bottom: "linear-gradient(180deg, rgba(5,7,19,0) 0%, rgba(5,7,19,0.75) 52%, rgba(5,7,19,1) 100%)"

  content_card_large:
    source: "observed"
    width: "225px"
    height: "400px"
    border_radius: "{radii.component}"
    image_height: "300px"
    info_bg: "{colors.dark.surface1}"
    title_style: "{typography.h2}"
    desc_style: "{typography.body_sm}"

  content_card_medium:
    source: "observed"
    width: "117px"
    height: "156px"
    border_radius: "{radii.component}"
    title_style: "{typography.body_sm}"
    tag_style: "{typography.tag}"

  content_card_list:
    source: "observed"
    image_size: "108px × 144px"
    border_radius: "{radii.component}"
    stroke: "0.9px {colors.dark.border_visible}"
    title_style: "{typography.h3}"
    desc_style: "{typography.body}"
    button_radius: "{radii.component}"
    button_bg: "{colors.dark.surface2}"

  tag:
    source: "observed"
    height: "20px"
    padding: "0 6px"
    border_radius: "{radii.control}"
    bg: "{colors.dark.surface1}"
    text_color: "{brand.500}"
    font: "{typography.tag}"

  tag_status:
    source: "observed"
    height: "14px"
    padding: "3px 8px"
    border_radius: "0 0 0 8px"
    position: "top-right corner of card"
    variants:
      hot:
        bg: "{colors.tag_hot}"
        text: "{colors.dark.surface1}"
      new:
        bg: "{colors.tag_new}"
        text: "{colors.dark.surface1}"
      exclusive:
        bg: "{colors.tag_exclusive}"
        text: "{colors.dark.surface1}"

  tag_gradient:
    source: "observed"
    height: "20px"
    border_radius: "8px 0 0 8px"
    bg: "{colors.tag_brand}"
    text_color: "{colors.dark.surface2}"
    font: "{typography.tag}"

  play_badge:
    source: "observed"
    height: "20px"
    padding: "0 8px"
    border_radius: "{radii.control}"
    bg: "rgba(20, 22, 33, 0.12)"
    backdrop_filter: "blur(40px)"
    icon: "play-fill 10px"
    text_color: "{neutral.50}"
    font: "{typography.caption}"

  button_play:
    source: "observed"
    height: "32px"
    padding: "6px 20px"
    border_radius: "{radii.component}"
    bg: "{colors.dark.surface2}"
    text_color: "{neutral.50}"
    font: "{typography.h3}"
    icon: "play-fill"

  exclusive_pill:
    source: "observed"
    height: "14px"
    padding: "3px 4px"
    border_radius: "{radii.full}"
    bg: "{colors.dark.background}"
    text_gradient: "linear-gradient(90deg, #4051FF 0%, #CECECE 100%)"
    font: "{typography.label}"

  tab_bar:
    source: "observed"
    border_radius: "{radii.container}"
    bg: "rgba(25, 26, 30, 0.76)"
    backdrop_filter: "blur(40px)"
    items: ["Home", "Short", "Reward", "My List", "Profile"]
    active_text_color: "{neutral.50}"
    active_font_weight: 600
    inactive_text_color: "{neutral.300}"
    inactive_font_weight: 400
    font: "{typography.tag}"

  section_title:
    source: "observed"
    font: "{typography.display}"
    color: "{neutral.50}"
    text_case: "title"

app_screen:
  archetype: "feed"
  frame: "phone"
  frame_params:
    title: "VibeShort"
  content_seed: "Popular drama feed with banner, horizontal scrolls, and vertical list"
  required_tokens_checklist:
    - "background, surface1, surface2, surface3, border, border_visible"
    - "text1, text2, text3, text4"
    - "accent, accent_subtle, success, warning, error"
    - "all typography scale tokens"
    - "all spacing tokens used in components"
