<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, user-scalable=no">
<title>VibeShort — Logo 动效预览</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050713;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
.stage {
  width: 375px; height: 812px;
  position: relative; overflow: hidden;
  background: #050713;
  display: flex; justify-content: center; align-items: center;
}
/* Controls */
.demo-ctrl {
  position: absolute; top: 12px; left: 50%;
  transform: translateX(-50%);
  z-index: 100; display: flex; gap: 8px;
}
.demo-btn {
  background: #6A74FF; color: #fff; border: none;
  border-radius: 6px; padding: 8px 16px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  white-space: nowrap; opacity: 0.85;
  font-family: -apple-system, sans-serif;
}
.demo-btn:hover { opacity: 1; }
.demo-btn:active { transform: scale(0.96); }
.demo-btn.secondary { background: rgba(50,50,50,0.7); }

/* Animation container */
.anim-wrap {
  position: relative;
  display: flex; align-items: center;
  height: 120px;
}

/* Glow behind icon */
.icon-glow {
  position: absolute;
  width: 160px; height: 160px;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(63,49,255,0.4) 0%, rgba(90,104,255,0.15) 50%, transparent 75%);
  filter: blur(20px);
  opacity: 0;
  pointer-events: none;
  transition: none;
}

/* V icon */
.v-icon {
  width: 80px; height: 80px;
  position: relative;
  z-index: 2;
  opacity: 0;
  transform: scale(0.5);
  will-change: transform, opacity;
  flex-shrink: 0;
}
.v-icon img {
  width: 100%; height: 100%;
  object-fit: contain;
  border-radius: 14px;
}

/* Film strip that unfolds from V */
.film-strip {
  position: relative;
  height: 48px;
  width: 0;
  overflow: hidden;
  opacity: 0;
  z-index: 1;
  margin-left: -6px;
  will-change: width, opacity;
  flex-shrink: 0;
}
.film-strip-inner {
  height: 48px;
  min-width: 220px;
  background: linear-gradient(135deg, #3F31FF 0%, #5A68FF 35%, #4051FF 70%, #00AAFF 100%);
  border-radius: 0 6px 6px 0;
  position: relative;
  display: flex;
  align-items: center;
}
/* Film sprocket holes */
.holes-row {
  position: absolute; left: 8px; right: 8px;
  display: flex; gap: 8px;
}
.holes-row.top { top: 4px; }
.holes-row.bot { bottom: 4px; }
.hole {
  width: 6px; height: 4px;
  border-radius: 1px;
  background: rgba(5,7,19,0.45);
  flex-shrink: 0;
}

/* Brand text */
.brand-text {
  font-family: 'Montserrat', -apple-system, sans-serif;
  font-size: 24px;
  font-weight: 800;
  color: #fff;
  white-space: nowrap;
  opacity: 0;
  margin-left: 14px;
  letter-spacing: 0.5px;
  text-shadow: 0 0 30px rgba(106,116,255,0.6), 0 0 60px rgba(90,104,255,0.3);
  will-change: opacity, transform;
  transform: translateX(20px);
  z-index: 3;
  flex-shrink: 0;
}
</style>
</head>
<body>
<div class="stage">
  <div class="demo-ctrl">
    <button class="demo-btn" id="btnPlay">播放动效</button>
    <button class="demo-btn secondary" id="btnReset">重置</button>
    <button class="demo-btn secondary" id="btnLoop">循环</button>
  </div>

  <div class="anim-wrap" id="animWrap">
    <div class="icon-glow" id="glow"></div>
    <div class="v-icon" id="vIcon">
      <img src="assets/vibeshort-icon-hd.png" alt="V">
    </div>
    <div class="film-strip" id="filmStrip">
      <div class="film-strip-inner">
        <div class="holes-row top"></div>
        <div class="holes-row bot"></div>
      </div>
    </div>
    <div class="brand-text" id="brandText">VibeShort</div>
  </div>
</div>
</body>
</html>

<script>
// Generate film holes
document.querySelectorAll('.holes-row').forEach(row => {
  for (let i = 0; i < 22; i++) row.appendChild(Object.assign(document.createElement('div'), {className:'hole'}));
});

// ─── Elements ───
const glow = document.getElementById('glow');
const vIcon = document.getElementById('vIcon');
const filmStrip = document.getElementById('filmStrip');
const brandText = document.getElementById('brandText');
const animWrap = document.getElementById('animWrap');

// ─── Easing helpers ───
function easeOutCubic(t) { return 1 - Math.pow(1-t, 3); }
function easeInCubic(t) { return t*t*t; }
function easeInOutCubic(t) { return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }
function easeOutBack(t) { const c=1.7; return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2); }
function easeOutQuart(t) { return 1-Math.pow(1-t,4); }
function lerp(a,b,t) { return a+(b-a)*t; }
function clamp(t) { return Math.max(0, Math.min(1, t)); }

// ─── Animation Timeline (ms) ───
// Phase 1: V fades in + scale up with glow        0 → 700
// Phase 2: V shifts left, film strip unfolds       700 → 1500
// Phase 3: Color brightens, text fades in          1500 → 2100
// Phase 4: Hold                                    2100 → 3200
// Phase 5: Text fades out                          3200 → 3600
// Phase 6: Film strip collapses, V returns center  3600 → 4300
// Phase 7: V settles with subtle glow pulse        4300 → 5000

const TOTAL = 5000;
let raf = 0, t0 = 0, running = false, looping = false;

function applyFrame(ms) {
  const t = ms;

  // ── Phase 1: V appear ──
  const vIn = easeOutBack(clamp(t / 700));
  vIcon.style.opacity = String(clamp(vIn));
  vIcon.style.transform = `scale(${lerp(0.5, 1, clamp(vIn))})`;

  // Glow appear
  const glowIn = easeOutCubic(clamp(t / 800));
  const glowPulse = 1 + 0.12 * Math.sin(t / 400);
  glow.style.opacity = String(clamp(glowIn * 0.8 * glowPulse));

  // ── Phase 2: Shift left + film strip ──
  const shiftT = easeInOutCubic(clamp((t - 700) / 800));
  const shiftBack = easeInOutCubic(clamp((t - 3600) / 700));
  const shift = shiftT - shiftBack;

  // Film strip
  const stripIn = easeOutQuart(clamp((t - 800) / 700));
  const stripOut = easeInCubic(clamp((t - 3600) / 600));
  const stripProgress = clamp(stripIn - stripOut);
  const stripWidth = lerp(0, 180, stripProgress);

  filmStrip.style.width = stripWidth + 'px';
  filmStrip.style.opacity = String(clamp(stripProgress * 3));

  // Color brighten on film strip
  const brighten = clamp(stripProgress);
  const hue = lerp(0, 20, brighten);
  filmStrip.querySelector('.film-strip-inner').style.filter = `hue-rotate(${hue}deg) brightness(${lerp(0.85, 1.15, brighten)})`;

  // Glow intensify during expand
  const glowExpand = lerp(0.8, 1.2, stripProgress);
  glow.style.opacity = String(clamp(glowIn * glowExpand * glowPulse));
  glow.style.transform = `translate(-50%, -50%) scale(${lerp(1, 1.3, stripProgress)})`;

  // ── Phase 3: Text fade in ──
  const textIn = easeOutCubic(clamp((t - 1500) / 600));
  const textOut = easeInCubic(clamp((t - 3200) / 400));
  const textAlpha = clamp(textIn - textOut);
  const textX = lerp(20, 0, textIn) + lerp(0, -15, textOut);

  brandText.style.opacity = String(textAlpha);
  brandText.style.transform = `translateX(${textX}px)`;

  // ── Phase 7: Final settle ──
  const settleT = clamp((t - 4300) / 700);
  if (settleT > 0) {
    const settlePulse = 1 - 0.15 * easeOutCubic(settleT);
    glow.style.opacity = String(clamp(0.7 * settlePulse * (1 + 0.1 * Math.sin(t / 500))));
    glow.style.transform = `translate(-50%, -50%) scale(${lerp(1.1, 1, easeOutCubic(settleT))})`;
  }
}

function tick(now) {
  if (!running) return;
  if (!t0) t0 = now;
  const elapsed = now - t0;

  if (elapsed >= TOTAL) {
    applyFrame(TOTAL);
    if (looping) {
      t0 = 0;
      // Brief pause before loop
      setTimeout(() => {
        if (looping && running) {
          resetVisuals();
          raf = requestAnimationFrame(tick);
        }
      }, 600);
    } else {
      running = false;
    }
    return;
  }

  applyFrame(elapsed);
  raf = requestAnimationFrame(tick);
}

function resetVisuals() {
  t0 = 0;
  vIcon.style.opacity = '0';
  vIcon.style.transform = 'scale(0.5)';
  glow.style.opacity = '0';
  glow.style.transform = 'translate(-50%, -50%) scale(1)';
  filmStrip.style.width = '0';
  filmStrip.style.opacity = '0';
  brandText.style.opacity = '0';
  brandText.style.transform = 'translateX(20px)';
}

function play() {
  cancelAnimationFrame(raf);
  running = false;
  resetVisuals();
  // Small delay so reset is visible
  requestAnimationFrame(() => {
    running = true;
    t0 = 0;
    raf = requestAnimationFrame(tick);
  });
}

function reset() {
  cancelAnimationFrame(raf);
  running = false;
  looping = false;
  document.getElementById('btnLoop').textContent = '循环';
  resetVisuals();
}

// Init
resetVisuals();

document.getElementById('btnPlay').addEventListener('click', play);
document.getElementById('btnReset').addEventListener('click', reset);
document.getElementById('btnLoop').addEventListener('click', () => {
  looping = !looping;
  document.getElementById('btnLoop').textContent = looping ? '停止循环' : '循环';
  if (looping && !running) play();
  if (!looping) { /* will stop after current cycle */ }
});
</script>
