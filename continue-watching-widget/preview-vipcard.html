<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=375, initial-scale=1.0" />
<title>VIP Card 磨砂流光</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050713;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 40px;
    font-family: 'Lexend Deca', sans-serif;
    padding: 40px 20px;
  }

  .card-outer {
    position: relative;
    width: 307px;
    height: 128px;
    border-radius: 20px;
    overflow: hidden;
  }

  /* ===== 光源层 ===== */
  .light-source {
    position: absolute;
    inset: -40px;
    z-index: 0;
    overflow: hidden;
  }

  .light-blob {
    position: absolute;
    border-radius: 50%;
    will-change: transform;
  }

  /* 左上大片深紫光雾 — 拉长椭圆 */
  .blob-1 {
    width: 250px; height: 140px;
    background: radial-gradient(ellipse, rgba(75,30,160,0.95) 0%, rgba(60,20,140,0.5) 40%, transparent 70%);
    top: 10px; left: -40px;
    filter: blur(35px);
    animation: drift1 8s ease-in-out infinite;
  }
  /* 中部偏右蓝紫光 */
  .blob-2 {
    width: 180px; height: 200px;
    background: radial-gradient(ellipse, rgba(55,40,180,0.85) 0%, rgba(45,30,160,0.4) 45%, transparent 70%);
    top: -20px; right: 10px;
    filter: blur(40px);
    animation: drift2 10s ease-in-out infinite;
  }
  /* 中下偏右的蓝色光 */
  .blob-3 {
    width: 200px; height: 120px;
    background: radial-gradient(ellipse, rgba(50,50,200,0.7) 0%, rgba(40,40,180,0.3) 45%, transparent 70%);
    bottom: 0px; right: -10px;
    filter: blur(35px);
    animation: drift3 9s ease-in-out infinite;
  }
  /* 左下角微弱的紫色补光 */
  .blob-4 {
    width: 160px; height: 100px;
    background: radial-gradient(ellipse, rgba(90,40,180,0.5) 0%, rgba(70,30,160,0.2) 45%, transparent 70%);
    bottom: -10px; left: 20px;
    filter: blur(30px);
    animation: drift4 7s ease-in-out infinite;
  }

  @keyframes drift1 {
    0%, 100% { transform: translate(0, 0); }
    30%      { transform: translate(30px, 15px); }
    60%      { transform: translate(50px, -5px); }
  }
  @keyframes drift2 {
    0%, 100% { transform: translate(0, 0); }
    40%      { transform: translate(-40px, 20px); }
    70%      { transform: translate(-15px, 30px); }
  }
  @keyframes drift3 {
    0%, 100% { transform: translate(0, 0); }
    35%      { transform: translate(-35px, -15px); }
    65%      { transform: translate(-60px, -5px); }
  }
  @keyframes drift4 {
    0%, 100% { transform: translate(0, 0); }
    50%      { transform: translate(50px, -10px); }
  }

  /* ===== 磨砂玻璃卡片 ===== */
  .vip-card {
    position: absolute;
    inset: 0;
    z-index: 1;
    border-radius: 20px;
    border: 1px solid rgba(185,179,235,0.3);
    backdrop-filter: blur(40px) saturate(1.3) brightness(0.85);
    -webkit-backdrop-filter: blur(40px) saturate(1.3) brightness(0.85);
    background: rgba(8, 10, 25, 0.55);
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 8px;
    cursor: pointer;
    /* 底部细微反光线 */
    box-shadow: inset 0 -1px 0 0 rgba(185,179,235,0.12);
  }

  /* 标签 */
  .tag {
    position: absolute; top: -1px; right: -1px; z-index: 3;
    display: flex; align-items: center; gap: 4px;
    padding: 0 8px; height: 20px;
    background: linear-gradient(to left, #f2d7b8, #9ea5ff);
    border-radius: 0 20px 0 10px;
    font-size: 10px; font-weight: 500; color: #2a0693;
  }
  .tag-divider { width: 1px; height: 8px; background: #2a0693; }

  .title-row {
    display: flex; align-items: center; gap: 8px;
    position: relative; z-index: 2;
  }
  .title-text {
    font-size: 18px; font-weight: 500; line-height: 28px;
    background: linear-gradient(to left, #ffe0b5, #ffffff);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    text-transform: capitalize; white-space: nowrap;
  }
  .content-row {
    display: flex; align-items: center; gap: 4px;
    flex: 1; position: relative; z-index: 2; text-transform: capitalize;
  }
  .desc-col {
    flex: 1; display: flex; flex-direction: column; gap: 4px;
    font-size: 10px; line-height: 12px;
  }
  .desc-main { color: #c4c7d6; }
  .desc-sub  { color: rgba(196,199,214,0.6); }
  .price-col {
    display: flex; flex-direction: column; align-items: center;
    gap: 2px; padding: 0 16px 0 8px; color: #ffe0b5; white-space: nowrap;
  }
  .price-current { font-size: 24px; line-height: 32px; }
  .price-original { font-size: 12px; line-height: 16px; font-weight: 300; text-decoration: line-through; }

  .label { color: rgba(255,255,255,0.3); font-size: 11px; letter-spacing: 1px; }
</style>
</head>
<body>

<span class="label">VIP CARD — FROSTED GLASS + FLOWING LIGHTS</span>

<div class="card-outer">
  <div class="light-source">
    <div class="light-blob blob-1"></div>
    <div class="light-blob blob-2"></div>
    <div class="light-blob blob-3"></div>
    <div class="light-blob blob-4"></div>
  </div>

  <div class="vip-card">
    <div class="tag">
      <span>23:40:12</span>
      <div class="tag-divider"></div>
      <span>20% Off</span>
    </div>

    <div class="title-row">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="3" y="6" width="14" height="10" rx="2" fill="url(#vg)" opacity="0.9"/>
        <text x="10" y="13.5" text-anchor="middle" font-size="7" font-weight="700"
              fill="#1a1028" font-family="Lexend Deca">VIP</text>
        <defs><linearGradient id="vg" x1="3" y1="6" x2="17" y2="16">
          <stop stop-color="#ffe0b5"/><stop offset="1" stop-color="#c9a46c"/>
        </linearGradient></defs>
      </svg>
      <span class="title-text">Monthly Pass Pro</span>
    </div>

    <div class="content-row">
      <div class="desc-col">
        <span class="desc-main">Unlock all series for 1 month</span>
        <span class="desc-sub">Renew at $199.99/month · Auto renew · Cancel anytime</span>
      </div>
      <div class="price-col">
        <span class="price-current">$16.99</span>
        <span class="price-original">$199.99</span>
      </div>
    </div>
  </div>
</div>

</body>
</html>
