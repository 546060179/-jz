<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINETIC UI - 跨端动效组件库</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rubik:wght@400;600;700&family=Montserrat:wght@600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--c:#186CE5;--ch:#6AADFF;--bg:#151515;--bg2:#171717;--bg3:#1C1C1C;--t1:#FFFFFF;--t2:rgba(255,255,255,.6);--t3:rgba(255,255,255,.4);--bd:rgba(217,217,217,.12);--r:24px;--hh:52px;--ff:'PingFang SC',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--mono:'Fira Code',monospace;--rubik:'Rubik',var(--ff)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ff);color:var(--t1);background:var(--bg);line-height:1.6}
a{color:var(--ch);text-decoration:none}
code{font-family:var(--mono);font-size:.85em;background:rgba(255,255,255,.06);padding:2px 6px;border-radius:4px;color:var(--ch)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#444;border-radius:20px}

.hd{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--hh);background:var(--bg);display:flex;align-items:center;padding:12px 40px;justify-content:space-between}
.hd-logo{font-family:'Rubik',var(--ff);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:10px;line-height:22px;background:linear-gradient(90deg,rgba(151,207,248,1) 0%,rgba(220,220,220,1) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.hd-logo-icon{width:32px;height:32px;border-radius:8px;flex-shrink:0;overflow:hidden;-webkit-text-fill-color:initial}
.hd-r{display:flex;align-items:center;gap:32px}
.hd-search-wrap{position:relative;width:270px}
.hd-search{width:100%;height:40px;border-radius:100px;border:none;background:rgba(255,255,255,.12);backdrop-filter:blur(40px);padding:10px 44px 10px 20px;font-size:14px;font-weight:400;outline:none;color:var(--t1);font-family:var(--ff);line-height:1.43}
.hd-search::placeholder{color:var(--t3)}
.hd-search:focus{box-shadow:0 0 0 1px var(--c);background:rgba(255,255,255,.16)}
.hd-search-ico{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
.hd-kbd{display:none}
.hd-link{font-size:14px;font-weight:600;color:#fff;cursor:pointer;text-decoration:none;font-family:var(--ff);line-height:1.43;transition:opacity .2s;opacity:.85}
.hd-link:hover{opacity:1}

.wrap{display:flex;margin-top:var(--hh);min-height:calc(100vh - var(--hh))}
.side{width:300px;min-width:190px;max-width:500px;flex-shrink:0;position:fixed;top:var(--hh);left:0;height:calc(100vh - var(--hh));overflow:hidden;padding:20px;background:var(--bg);z-index:50}
.side-resize{position:absolute;top:0;right:0;width:4px;height:100%;cursor:col-resize;z-index:51}
.side-resize:hover,.side-resize.dragging{background:var(--c);opacity:.5}
.main{flex:1;margin-left:300px;padding:40px 40px 40px 40px;background:var(--bg);animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.side-head{display:none}
.side-icon{display:none}
.side-title{display:none}
.side-sub{display:none}

/* Sidebar — Figma KINETIC UI style */
.side-inner{background:#1C1C1C;border-radius:28px;padding:20px;display:flex;flex-direction:column;gap:24px;height:calc(100vh - var(--hh) - 40px);overflow-y:auto;scrollbar-width:none}
.side-inner::-webkit-scrollbar{width:6px;background:transparent}
.side-inner::-webkit-scrollbar-thumb{background:transparent;border-radius:20px;transition:background .3s}
.side-inner.scrolling::-webkit-scrollbar-thumb{background:#444}
.side-inner.scrolling{scrollbar-width:thin;scrollbar-color:#444 transparent}
.sg{padding:12px 24px;font-size:16px;font-weight:600;color:var(--t2);margin-top:0;display:flex;align-items:center;justify-content:space-between;border-radius:100px;transition:background .2s ease,color .2s ease;user-select:none}
.sg:hover{background:rgba(255,255,255,.04);color:var(--t1)}
.sg-label{cursor:pointer;flex:1}
.sg-chevron{width:16px;height:16px;transition:transform .25s ease;flex-shrink:0;opacity:.5;cursor:pointer;padding:4px;box-sizing:content-box;border-radius:6px}
.sg-chevron:hover{opacity:1;background:rgba(255,255,255,.08)}
.sg.collapsed .sg-chevron{transform:rotate(-90deg)}
.sg-items{display:flex;flex-direction:column;gap:4px;overflow:hidden;transition:max-height .3s ease,opacity .25s ease;opacity:1}
.sg-items.collapsed{max-height:0 !important;opacity:0;pointer-events:none}
.side-group{display:flex;flex-direction:column;gap:4px;border-top:1px solid rgba(217,217,217,.12);padding-top:0}
.side-group:first-of-type{border-top:none}

.si{display:block;padding:12px 24px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;border-radius:20px;transition:all .2s ease;line-height:1.33}
.si:hover{color:var(--t1);background:rgba(255,255,255,.06)}
.si.on{color:#fff !important;background:var(--c) !important;border-radius:20px;box-shadow:0 2px 8px rgba(24,108,229,.3)}
.si-top{display:block;padding:12px 24px;font-size:16px;font-weight:600;color:var(--t2);background:transparent;border-radius:20px;cursor:pointer;text-align:left;border:none;transition:all .2s ease}
.si-top:hover{background:rgba(255,255,255,.06);color:var(--t1)}
.si-top.on{color:#fff !important;background:var(--c) !important;box-shadow:0 2px 8px rgba(24,108,229,.3)}
.si .cnt{display:none}
.si-ico{display:none}
.side-ver{padding:12px 24px;font-family:'Montserrat',var(--ff);font-size:12px;font-weight:600;color:var(--t2);background:none;border-radius:12px;margin-top:8px;text-align:center}

.pg-t{font-family:var(--rubik);font-size:32px;font-weight:700;margin-bottom:8px;color:var(--t1);line-height:44px}
.pg-d{font-size:14px;font-weight:400;color:var(--t2);margin-bottom:60px;line-height:20px}


/* Inline search in content area */
.ov-search{position:relative;margin-bottom:24px}
.ov-search input{width:100%;height:40px;border-radius:8px;border:1px solid var(--bd);background:var(--bg2);padding:0 16px 0 40px;font-size:14px;color:var(--t1);outline:none}
.ov-search input::placeholder{color:var(--t3)}
.ov-search input:focus{border-color:var(--c)}
.ov-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
.sec{margin-bottom:32px}
.sec h2{font-size:17px;font-weight:600;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bd);color:var(--t1)}
.sec p{font-size:13px;color:var(--t2);line-height:1.8;margin-bottom:6px}

/* Category section */
.cat-sec{margin-bottom:60px;scroll-margin-top:80px}
.cat-sec:last-child{margin-bottom:0}
.cat-sec h3{font-family:var(--rubik);font-size:24px;font-weight:700;color:var(--t1);margin-bottom:16px;display:flex;align-items:center;gap:8px;line-height:44px}
.cat-sec h3 span{font-family:var(--rubik);font-size:12px;font-weight:600;color:#fff;background:rgba(255,255,255,.1);padding:4px 8px;border-radius:8px;line-height:16px}

.cases{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.case{display:flex;flex-direction:column;border:none;cursor:pointer;transition:transform .25s ease,box-shadow .25s ease;background:transparent;overflow:hidden;border-radius:var(--r);min-width:0;border:1px solid transparent}
.case:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.4);border-color:var(--c)}
.case-preview{height:200px;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;border-radius:var(--r) var(--r) 0 0}
.case-preview .cp-wrap{transform:scale(1.6);display:flex;align-items:center;justify-content:center}
.case-info{padding:16px;background:#242424;border-radius:0 0 var(--r) var(--r);display:flex;flex-direction:column;gap:4px}
.case-name{font-size:14px;font-weight:600;color:#fff;line-height:20px}
.case-eng{font-size:12px;font-weight:600;color:var(--t2);line-height:20px;font-family:var(--ff)}
.case-desc{display:none}

.demo-replay{position:absolute;bottom:8px;right:8px;padding:3px 10px;border-radius:4px;font-size:10px;background:rgba(46,91,255,.15);color:var(--ch);border:1px solid rgba(46,91,255,.2);cursor:pointer;transition:opacity .15s;font-family:var(--ff)}

/* Detail page — Ant Design style */
.dt-title{font-size:30px;font-weight:600;color:var(--t1);margin-bottom:12px}
.dt-desc{font-size:14px;color:var(--t2);line-height:1.8;margin-bottom:20px}
.dt-import{margin-bottom:24px;padding:12px 16px;background:var(--bg3);border:1px solid var(--bd);border-radius:6px;font-family:var(--mono);font-size:13px;color:var(--t2)}
.dt-section{margin-bottom:32px}
.dt-section h2{font-size:20px;font-weight:600;color:var(--t1);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.dt-section h2 a{font-size:12px;color:var(--t3);margin-left:8px;font-weight:400}
.dt-section h2 a:hover{color:var(--c)}
.dt-when{font-size:14px;color:var(--t2);line-height:2}
.dt-when li{list-style:none;padding-left:0}
.dt-demo-box{border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:16px}
.dt-demo-preview{padding:40px;background:var(--bg3);display:flex;align-items:center;justify-content:center;min-height:160px;position:relative;cursor:pointer}
.dt-demo-preview .cp-wrap{transform:scale(2);display:flex;align-items:center;justify-content:center}
.dt-demo-preview:hover .demo-replay{opacity:1}
.dt-demo-meta{padding:12px 16px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.dt-demo-title{font-size:14px;font-weight:500;color:var(--t1)}
.dt-demo-desc{font-size:13px;color:var(--t2);padding:0 16px 12px;line-height:1.7}
.dt-demo-actions{display:flex;gap:8px}
.dt-demo-actions button{background:none;border:none;color:var(--t3);cursor:pointer;padding:4px;font-size:14px}
.dt-demo-actions button:hover{color:var(--t1)}
.dt-api{margin-bottom:32px}
.dt-api h2{font-size:20px;font-weight:600;color:var(--t1);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.dt-nav{position:fixed;right:24px;top:calc(var(--hh) + 24px);width:140px;font-size:12px;border-left:1px solid var(--bd);padding-left:0}
.dt-nav a{display:block;padding:3px 0 3px 12px;color:var(--t3);cursor:pointer;transition:all .12s;line-height:1.6;border-left:2px solid transparent;margin-left:-1px}
.dt-nav a:hover{color:var(--t1)}
.dt-nav a.on{color:var(--c);border-left-color:var(--c)}
.dt-prev-next{display:flex;justify-content:space-between;padding:24px 0;border-top:1px solid var(--bd);margin-top:32px}
.dt-prev-next a{font-size:14px;color:var(--ch);cursor:pointer}
.dt-prev-next a:hover{color:var(--c)}

/* Visual Editor */
.dt-editor{display:grid;grid-template-columns:320px 1fr;gap:16px;border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:16px;background:var(--bg3)}
.dt-editor-panel{padding:16px;border-right:1px solid var(--bd);display:flex;flex-direction:column;gap:14px;background:rgba(255,255,255,.02)}
.dt-editor-row{display:flex;flex-direction:column;gap:6px}
.dt-editor-row label{font-size:12px;color:var(--t3);font-weight:500;display:flex;justify-content:space-between;align-items:center}
.dt-editor-row label .v{color:var(--ch);font-family:var(--mono)}
.dt-editor-row input[type=range]{width:100%;accent-color:var(--c);cursor:pointer}
.dt-editor-row input[type=range]:disabled{opacity:.4;cursor:not-allowed}
.dt-editor-row select{width:100%;height:32px;border-radius:6px;border:1px solid var(--bd);background:var(--bg2);color:var(--t1);padding:0 10px;font-size:13px;outline:none;cursor:pointer;font-family:var(--ff)}
.dt-editor-row select:focus{border-color:var(--c)}
.dt-editor-row select:disabled{opacity:.4;cursor:not-allowed}
.dt-editor-preview{padding:32px;display:flex;align-items:center;justify-content:center;min-height:200px;position:relative;cursor:pointer;background:var(--bg2)}
.dt-editor-preview .cp-wrap{transform:scale(2);display:flex;align-items:center;justify-content:center}
.dt-editor-reset{position:absolute;top:12px;right:12px;padding:4px 12px;border-radius:4px;font-size:11px;background:rgba(255,255,255,.06);border:1px solid var(--bd);color:var(--t2);cursor:pointer;font-family:var(--ff)}
.dt-editor-reset:hover{background:rgba(24,108,229,.1);color:var(--ch)}
.dt-editor-code-wrap{border-top:1px solid var(--bd);grid-column:1 / -1;background:var(--bg3)}
.dt-editor-tabs{display:flex;border-bottom:1px solid var(--bd);background:rgba(255,255,255,.02)}
.dt-editor-tab{padding:8px 16px;font-size:12px;font-weight:500;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:var(--ff);background:none;border-left:none;border-right:none;border-top:none}
.dt-editor-tab:hover{color:var(--t1)}
.dt-editor-tab.on{color:var(--ch);border-bottom-color:var(--c)}
.dt-editor-code{padding:14px 16px;font-family:var(--mono);font-size:12px;line-height:1.7;color:var(--t2);overflow-x:auto;white-space:pre;margin:0}
.dt-editor-hint{grid-column:1 / -1;padding:14px 16px;font-size:12px;color:#fbbf24;background:rgba(250,204,21,.06);border-top:1px solid rgba(250,204,21,.12);line-height:1.6}
@media(max-width:800px){.dt-editor{grid-template-columns:1fr}.dt-editor-panel{border-right:none;border-bottom:1px solid var(--bd)}}

/* AI Prompt button */
.dt-ai-prompt{margin:24px 0;padding:20px;border:1px solid var(--bd);border-radius:8px;background:linear-gradient(135deg,rgba(24,108,229,.06),rgba(106,173,255,.03));display:flex;justify-content:space-between;align-items:center;gap:16px}
.dt-ai-prompt-text{flex:1;min-width:0}
.dt-ai-prompt-title{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.dt-ai-prompt-desc{font-size:12px;color:var(--t3);line-height:1.6}
.dt-ai-prompt-btn{flex-shrink:0;padding:10px 20px;border-radius:6px;background:var(--c);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:var(--ff);display:inline-flex;align-items:center;gap:6px}
.dt-ai-prompt-btn:hover{background:#2e7cf0;transform:translateY(-1px);box-shadow:0 4px 12px rgba(24,108,229,.3)}
.dt-ai-prompt-btn.copied{background:#52c41a}
.dt-ai-prompt-controls{display:flex;align-items:center;gap:8px;flex-shrink:0}
.dt-ai-prompt-select{height:40px;padding:0 12px;border-radius:6px;border:1px solid var(--bd);background:var(--bg2);color:var(--t1);font-size:13px;font-family:var(--ff);outline:none;cursor:pointer;min-width:130px}
.dt-ai-prompt-select:focus{border-color:var(--c)}
@media(max-width:700px){.dt-ai-prompt{flex-direction:column;align-items:stretch}.dt-ai-prompt-controls{flex-direction:column}.dt-ai-prompt-btn,.dt-ai-prompt-select{width:100%}}
@media(max-width:1200px){.dt-nav{display:none}}
.dt-code-block{margin-bottom:0}
.dt-code-label{font-size:13px;font-weight:600;color:var(--t1);padding:12px 0 6px;border-top:1px solid var(--bd)}

.ct{border:1px solid var(--bd);border-radius:var(--r);margin:12px 0;overflow:hidden;position:relative}
.ct-tabs{display:flex;border-bottom:1px solid var(--bd);background:rgba(255,255,255,.02)}
.ct-tab{padding:8px 16px;font-size:12px;font-weight:500;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.ct-tab:hover{color:var(--t1)}
.ct-tab.on{color:var(--ch);border-bottom-color:var(--c)}
.ct-body{padding:14px 16px;font-family:var(--mono);font-size:12px;line-height:1.7;overflow-x:auto;white-space:pre;background:var(--bg3);max-height:300px;overflow-y:auto;color:var(--t2)}

.warn{margin:8px 0;padding:12px 16px;border-radius:4px;background:rgba(250,204,21,.06);border:1px solid rgba(250,204,21,.12);font-size:12px;color:#fbbf24;line-height:1.6}
.tip{margin:8px 0;padding:12px 16px;border-radius:4px;background:rgba(46,91,255,.06);border:1px solid rgba(46,91,255,.12);font-size:12px;color:var(--ch);line-height:1.6}
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.tbl th{text-align:left;padding:8px 10px;background:rgba(255,255,255,.02);font-weight:600;color:var(--t2);border-bottom:1px solid var(--bd)}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--bd);color:var(--t2)}
.tbl td:first-child{color:var(--t1);font-weight:500}

.ft{padding:32px 48px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(67,70,86,.1);background:var(--bg);font-size:12px;color:var(--t3)}
.ft-links{display:flex;gap:24px}
.ft-links a{color:var(--t3);font-size:12px}
.ft-links a:hover{color:var(--t1)}

@keyframes cShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes cPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.88);opacity:.5}}
@keyframes cBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes cSpin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
@keyframes cFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes cRipple{0%{box-shadow:0 0 0 0 rgba(46,91,255,.4)}100%{box-shadow:0 0 0 10px rgba(46,91,255,0)}}
@keyframes cMarquee{0%{transform:translateX(16px)}100%{transform:translateX(-24px)}}
@keyframes cShimmerSweep{0%{transform:translateX(-100%) rotate(-25deg)}100%{transform:translateX(300%) rotate(-25deg)}}
@keyframes cSeqPop{0%{transform:scale(0.3);opacity:0}60%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:1}}

@media(max-width:1200px){.cases{grid-template-columns:repeat(3,1fr);gap:16px}}
@media(max-width:900px){.side{display:none}.main{margin-left:0;padding:20px}.mob-nav{display:flex}.hd-search-wrap{width:200px}.hd-search{width:100%}.hd-link{display:none}.cases{grid-template-columns:repeat(2,1fr)}}
@media(max-width:680px){.cases{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.cases{grid-template-columns:1fr}.main{padding:12px}}

.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg2);border-top:1px solid var(--bd);padding:6px 8px;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.mob-nav a{flex-shrink:0;padding:6px 12px;border-radius:4px;font-size:11px;color:var(--t3);white-space:nowrap;cursor:pointer}
.mob-nav a.on{background:rgba(46,91,255,.1);color:var(--ch);font-weight:600}

.ct-copy{position:absolute;top:8px;right:8px;padding:4px 12px;border-radius:4px;font-size:11px;background:rgba(255,255,255,.04);border:1px solid var(--bd);color:var(--t3);cursor:pointer;opacity:0;transition:all .2s;font-family:var(--ff)}
.ct-copy:hover{background:rgba(46,91,255,.1);color:var(--ch)}
.ct:hover .ct-copy{opacity:1}

.search-drop{position:absolute;top:calc(100% + 4px);right:0;width:340px;max-height:400px;overflow-y:auto;background:var(--bg2);border:1px solid var(--bd);border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none;z-index:200;padding:8px 0}
.search-drop.show{display:block}
.sr-item{padding:10px 16px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;color:var(--t2);border-radius:4px;margin:0 4px}
.sr-item:hover,.sr-item.sr-active{background:rgba(46,91,255,.08);color:var(--t1)}
.sr-item .sr-cat{font-size:10px;color:var(--t3);background:rgba(255,255,255,.04);padding:2px 8px;border-radius:2px;margin-left:auto;flex-shrink:0}
.sr-item .sr-desc{font-size:11px;color:var(--t3);margin-left:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}
.sr-item mark{background:rgba(46,91,255,.25);color:var(--ch);border-radius:1px;padding:0 1px}
.sr-empty{padding:20px;text-align:center;color:var(--t3);font-size:12px}
.sr-hint{padding:6px 16px;font-size:10px;color:var(--t3);border-top:1px solid var(--bd);display:flex;gap:12px;align-items:center}
.sr-hint kbd{padding:1px 5px;border-radius:2px;background:var(--bg3);font-size:10px;color:var(--t3);border:1px solid var(--bd)}

.back-top{position:fixed;bottom:24px;right:24px;width:40px;height:40px;border-radius:50%;background:var(--c);color:#fff;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(24,108,229,.4);z-index:90;transition:all .25s ease}
.back-top:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(24,108,229,.5)}
.back-top.show{display:flex}
@media(max-width:900px){.back-top{bottom:72px;right:16px}}

var CASES = {
popup: [
  {id:'modal', name:'Modal 弹窗', icon:'🪟', desc:'确认对话框、表单弹窗、图片预览', tags:['scale-fade','常用'],
   effect:'scale-fade-in', duration:300, easing:'expressive',

   react:'import { Motion, Fade, Presence } from "@kinetic-motion/react";\n\n// 推荐：Presence 自动管理进入/退出生命周期\n<Presence>\n  {open && (\n    <Fade key="overlay" in intent="enter">\n      <div className="overlay" onClick={onClose} />\n    </Fade>\n  )}\n  {open && (\n    <Motion key="modal" in effect="scale-fade-in" intent="enter">\n      <div className="modal">{children}</div>\n    </Motion>\n  )}\n</Presence>',
   vue:'<Presence>\n  <Fade v-if="open" key="overlay" in intent="enter">\n    <div class="overlay" @click="close" />\n  </Fade>\n  <Motion v-if="open" key="modal" in effect="scale-fade-in" intent="enter">\n    <div class="modal">{{ content }}</div>\n  </Motion>\n</Presence>',
   swift:'// 遮罩\nUIView.animate(withDuration: 0.3) {\n  self.overlay.alpha = 1\n}\n// 弹窗\nlet animator = MotionAnimator(targetView: modalView)\nanimator.start(entering: true, effects: EffectPresets.scaleFadeIn)',

   cautions:['推荐用 Presence 管理挂载/卸载，动画完成后自动销毁 DOM','遮罩和内容分开动画，遮罩用 Fade，内容用 Motion','弹窗打开时禁止背景滚动 (body overflow:hidden)','ESC 键和点击遮罩都要触发关闭动画','iOS 上 present(animated:true) 自带动画，避免重复'],
   tips:['推荐 scale(0.95)+fade 组合，微妙不夸张','transform-origin 默认 center，从按钮弹出时改为按钮位置','Android: DialogFragment 自带动画，可用 setStyle 自定义']},
  {id:'toast', name:'Toast 提示', icon:'💬', desc:'操作成功/失败的轻量提示', tags:['slide-up','fade'],
   effect:'slide-up-in', duration:150, easing:'enter',
   scenario:'用户完成操作后，底部滑入一条提示消息，3秒后自动淡出消失。',
   react:'<Motion in={show} effect="slide-up-in" intent="enter">\n  <div className="toast">{message}</div>\n</Motion>\n\n// 自动消失\nuseEffect(() => {\n  if(show) setTimeout(() => setShow(false), 3000);\n}, [show]);',
   vue:'<Motion :in="show" effect="slide-up-in" intent="enter">\n  <div class="toast">{{ message }}</div>\n</Motion>',
   swift:'let toast = ToastView(message: text)\nview.addSubview(toast)\nMotionAnimator(targetView: toast, options: FadeOptions(intent: .enter))\n  .start(entering: true, effects: EffectPresets.slideUpIn)\nDispatchQueue.main.asyncAfter(deadline: .now() + 3) {\n  MotionAnimator(targetView: toast, options: FadeOptions(intent: .exit))\n    .start(entering: false, effects: EffectPresets.slideDownOut)\n}',
   kotlin:'import com.fadeanimation.*\n\nval toast = ToastView(context, message)\ncontainer.addView(toast)\nMotionAnimator(toast, FadeOptions(intent = MotionIntent.ENTER))\n  .start(entering = true, effects = EffectPresets.SLIDE_UP_IN)\n// 3 秒后自动退出\ntoast.postDelayed({\n  MotionAnimator(toast).start(entering = false, effects = EffectPresets.SLIDE_DOWN_OUT)\n}, 3000)',
   cautions:['进入动画要快(150ms)，不要让用户等','多条 Toast 要排队，不要重叠','3-5秒后自动消失','不要遮挡重要操作按钮','Android 可用库内 ToastView，或系统 Snackbar'],
   tips:['底部滑入比顶部更不打扰','hover/touch 时暂停自动消失计时','退出用 slide-down+fade']},
  {id:'drawer', name:'抽屉面板', icon:'📂', desc:'侧边导航、筛选面板、购物车', tags:['slide','常用'],
   effect:'slide-right', duration:300, easing:'enter',
   scenario:'点击菜单图标，侧边栏从左侧滑入，同时半透明遮罩淡入。支持手势拖拽关闭。',
   react:'<Fade in={open} intent="enter">\n  <div className="overlay" onClick={close} />\n</Fade>\n<Motion in={open}\n  effect={[{type:"slide",direction:"right",distance:280}]}\n  intent="enter"\n>\n  <nav className="drawer">{menu}</nav>\n</Motion>',
   vue:'<Fade :in="open" intent="enter">\n  <div class="overlay" @click="close" />\n</Fade>\n<Motion :in="open"\n  :effect="[{type:\'slide\',direction:\'right\',distance:280}]"\n>\n  <nav class="drawer">{{ menu }}</nav>\n</Motion>',
   swift:'UIView.animate(withDuration: 0.3) {\n  self.drawerView.transform = .identity\n  self.overlay.alpha = 1\n}',

   cautions:['slide distance 要等于抽屉实际宽度','遮罩和面板分开动画','支持手势拖拽关闭(spring 回弹)','打开时禁止背景滚动','RTL 语言方向要镜像'],
   tips:['手势关闭用 spring 物理更自然','Android 优先用 DrawerLayout','iOS 用 UIPresentationController']},
  {id:'actionsheet', name:'操作面板', icon:'📋', desc:'分享、拍照选择、确认删除', tags:['slide-up','常用'],
   effect:'slide-up-in', duration:300, easing:'enter',
   scenario:'点击"更多"按钮，操作面板从底部滑入。包含多个操作选项和取消按钮。',
   react:'<Fade in={open} intent="enter">\n  <div className="overlay" onClick={close} />\n</Fade>\n<Motion in={open} effect="slide-up-in" intent="enter">\n  <div className="action-sheet">\n    {actions.map(a => <button key={a.key}>{a.label}</button>)}\n    <button onClick={close}>取消</button>\n  </div>\n</Motion>',
   vue:'<Motion :in="open" effect="slide-up-in" intent="enter">\n  <div class="action-sheet">...</div>\n</Motion>',
   swift:'let sheet = UIAlertController(title: nil, message: nil,\n  preferredStyle: .actionSheet)\nsheet.addAction(UIAlertAction(title: "分享", style: .default))\nsheet.addAction(UIAlertAction(title: "取消", style: .cancel))\npresent(sheet, animated: true)',
   kotlin:'val sheet = BottomSheetDialog(context)\nsheet.setContentView(R.layout.action_sheet)\nsheet.show()',
   cautions:['从底部滑入，不要从中间弹出','取消按钮和其他选项要有视觉分隔','危险操作用红色标记','iPhone X+ 底部安全区域要适配','Android 优先用 BottomSheetDialog'],
   tips:['iOS 优先用 UIAlertController(.actionSheet)','手势下滑关闭用 spring','选项超过5个用可滚动列表']},
  {id:'notification', name:'通知横幅', icon:'🔔', desc:'推送通知、应用内消息提醒', tags:['slide-down','fade'],
   effect:'slide-down', duration:200, easing:'enter',
   scenario:'收到新消息时，通知横幅从顶部滑入，显示标题和摘要，5秒后自动上滑消失。',
   react:'<Motion in={show}\n  effect={[{type:"fade"},{type:"slide",direction:"down",distance:20}]}\n  intent="enter"\n>\n  <div className="notification">\n    <img src={icon} /><span>{title}</span>\n  </div>\n</Motion>',
   vue:'<Motion :in="show" :effect="[{type:\'fade\'},{type:\'slide\',direction:\'down\',distance:20}]">\n  <div class="notification">...</div>\n</Motion>',
   swift:'let banner = NotificationBanner(title: title)\nview.addSubview(banner)\nMotionAnimator(targetView: banner).start(\n  entering: true,\n  effects: [.fade(from:0,to:1), .slide(direction:.down, distance:20)]\n)',
   kotlin:'import com.fadeanimation.*\n\nval banner = NotificationBanner(context, title)\ncontainer.addView(banner)\nMotionAnimator(banner).start(\n  entering = true,\n  effects = listOf(\n    MotionEffect.Fade(0f, 1f),\n    MotionEffect.Slide(SlideDirection.DOWN, 20f)\n  )\n)',
   cautions:['不要遮挡状态栏','5秒后自动消失','多条排队不堆叠','用户可上滑手势关闭','进入要快(200ms)'],
   tips:['顶部滑入+fade 最自然','点击跳转对应页面','退出用上滑+fade out']},
  {id:'continue-watching', name:'最近播放浮层', desc:'底部浮入的继续播放提示条，含封面、标题、播放和关闭按钮', tags:['slide-up','collapse','ShortMax'],
   effect:'slide-up + morph', duration:450, easing:'cubic-bezier(0, 0, 0.3, 1)',
   scenario:'用户打开 App 首页时，底部浮入一条"继续播放"提示条，显示上次观看的剧集封面、标题和集数。3秒后自动收缩为小浮窗。点击播放继续观看，点击关闭消失。',
   react:'import { ContinueWatching } from "@kinetic-motion/react";\n\n// 使用方式\n<ContinueWatching\n  cover="https://example.com/cover.jpg"\n  title="Genius Baby: daddy please take ..."\n  subtitle="EP.1 / EP.100"\n  autoShow={true}\n  autoShowDelay={500}    // 延迟 500ms 后滑入\n  collapseDelay={3000}   // 展示 3 秒后自动收缩\n  slideUpDuration={450}  // 滑入动画 450ms\n  fadeOutDuration={300}  // 文字淡出 300ms\n  shrinkDuration={400}   // 横条收缩 400ms\n  morphDuration={550}    // 变形为小浮窗 550ms\n  onPlay={() => navigate("/player/" + id)}\n  onDismiss={() => setShowBar(false)}\n  onCollapsed={() => console.log("已收缩为小浮窗")}\n/>\n\n// 动画阶段 (Phase):\n// hidden → sliding-up → banner → fading-content → shrinking → morphing → widget\n// 缓动函数: easeOutCubic(滑入) → easeInOutCubic(收缩) → easeOutBack(变形)',
   vue:'<script setup>\nimport { ContinueWatching } from "@kinetic-motion/vue";\n<\/script>\n\n<ContinueWatching\n  cover="cover.jpg"\n  title="剧名"\n  subtitle="EP.1 / EP.100"\n  :auto-show="true"\n  :collapse-delay="3000"\n  @play="goPlayer"\n  @dismiss="hideBar"\n  @collapsed="onCollapsed"\n/>',

   swift:'// iOS CABasicAnimation 做循环\nlet pulse = CABasicAnimation(keyPath: "transform.scale")\npulse.fromValue = 1.0\npulse.toValue = 1.15\npulse.duration = 0.75\npulse.autoreverses = true\npulse.repeatCount = .infinity\nbadge.layer.add(pulse, forKey: "pulse")\n\n// 停止：badge.layer.removeAnimation(forKey: "pulse")',
   kotlin:'// Android ObjectAnimator 做循环\nval anim = ObjectAnimator.ofPropertyValuesHolder(badge,\n  PropertyValuesHolder.ofFloat("scaleX", 1f, 1.15f),\n  PropertyValuesHolder.ofFloat("scaleY", 1f, 1.15f)\n).apply {\n  duration = 750L\n  repeatCount = ValueAnimator.INFINITE\n  repeatMode = ValueAnimator.REVERSE\n}\nanim.start()\n\n// 停止：anim.cancel()',
   cautions:['有新消息时才脉冲，已读后停止','同页面最多 1-2 个脉冲','幅度微妙(scale 1.1-1.15)','reduced-motion 下停止，只显示静态红点'],
   tips:['box-shadow 扩散比 scale 更优雅','用 CSS animation 而非 JS','数字超过 99 显示 99+']},
  {id:'ripple', name:'涟漪扩散', icon:'💧', desc:'Material 按钮点击、触摸反馈', tags:['ripple','Material'],
   effect:'CSS 扩散 / 系统原生 Ripple', duration:400, easing:'ease-out',
   scenario:'按钮点击时从触摸点扩散出圆形涟漪。库不提供 Ripple 组件，Web 用 CSS 自建，Android 优先用系统 RippleDrawable。',
   react:'// Web 自建：点击后在触点位置插入扩散 span\nfunction RippleButton({ children, onClick }) {\n  const handleClick = (e) => {\n    const btn = e.currentTarget;\n    const rect = btn.getBoundingClientRect();\n    const span = document.createElement("span");\n    span.className = "ripple";\n    span.style.left = (e.clientX - rect.left) + "px";\n    span.style.top = (e.clientY - rect.top) + "px";\n    btn.appendChild(span);\n    setTimeout(() => span.remove(), 400);\n    onClick?.(e);\n  };\n  return <button className="ripple-btn" onClick={handleClick}>{children}</button>;\n}\n// CSS: .ripple { animation: ripple 400ms ease-out; ... }',
   vue:'<!-- 同 React：点击后插入扩散 span，CSS 做扩散 keyframes -->',
   swift:'// iOS 自建：在触点位置插入圆形 view + UIView.animate 扩散\n@objc func handleTap(_ g: UITapGestureRecognizer) {\n  let point = g.location(in: button)\n  let ripple = UIView(frame: CGRect(x: point.x - 1, y: point.y - 1, width: 2, height: 2))\n  ripple.backgroundColor = UIColor.systemBlue.withAlphaComponent(0.2)\n  ripple.layer.cornerRadius = 1\n  button.addSubview(ripple)\n  UIView.animate(withDuration: 0.4, delay: 0, options: .curveEaseOut) {\n    ripple.transform = CGAffineTransform(scaleX: 40, y: 40)\n    ripple.alpha = 0\n  } completion: { _ in ripple.removeFromSuperview() }\n}',
   kotlin:'<!-- Android 优先用系统原生 RippleDrawable -->\n<Button\n  android:id="@+id/my_button"\n  android:background="?attr/selectableItemBackground" />\n\n// 或自定义 color：\n<ripple xmlns:android="http://schemas.android.com/apk/res/android"\n  android:color="#33186CE5">\n  <item android:drawable="@color/white" />\n</ripple>',
   cautions:['涟漪起点是触摸位置不是中心','Android 优先用系统 RippleDrawable','颜色要有足够对比度','不要每个元素都加'],
   tips:['Android: ?attr/selectableItemBackground 最简单','Web: CSS :active + transform 模拟','涟漪颜色用主色的 20% 透明度']},

loading: [
  {id:'spinner', name:'旋转加载', icon:'🔄', desc:'页面加载、按钮提交等待', tags:['spin','循环'],
   effect:'CSS rotate (CSS 层实现)', duration:800, easing:'linear',
   scenario:'数据请求中显示旋转加载指示器。循环动画建议用 CSS 原生 animation 实现，性能优于 JS 驱动。',
   react:'// 推荐：CSS 原生 @keyframes 实现循环旋转\n// .spinner {\n//   animation: spin 800ms linear infinite;\n//   border-top-color: var(--primary);\n// }\n// @keyframes spin { to { transform: rotate(360deg); } }\n\n<div className="spinner" aria-label="loading" />\n\n// 按钮内 loading：配合 Motion 控制出现/消失\nimport { Motion } from "@kinetic-motion/react";\n<Motion in={loading} effect="fade-in" intent="enter">\n  <div className="spinner" />\n</Motion>',

   swift:'// 循环加载推荐用系统 UIActivityIndicatorView\nlet indicator = UIActivityIndicatorView(style: .medium)\nindicator.startAnimating()\n\n// 按钮内 loading：用 motion() 控制出现\nimport FadeAnimation\nindicator.motion(entering: true,\n  effects: EffectPresets.fadeIn,\n  options: FadeOptions(intent: .enter))',
   kotlin:'// 循环加载推荐用系统 ProgressBar\n// <ProgressBar android:indeterminate="true" />\n\n// 按钮内 loading：用 MotionAnimator 控制出现\nimport com.fadeanimation.*\n\nMotionAnimator(progressBar, FadeOptions(intent = MotionIntent.ENTER))\n  .start(entering = true, effects = EffectPresets.FADE_IN)',
   cautions:['超过 1 秒才显示，避免闪烁','提供取消/超时机制','按钮内 spinner 替换文字'],
   tips:['延迟 200ms 再显示','iOS/Android 优先用系统原生']},
  {id:'progress', name:'进度条', icon:'📊', desc:'上传下载、表单填写进度', tags:['transition','数据驱动'],
   effect:'CSS width transition', duration:300, easing:'ease',
   scenario:'文件上传时进度条从 0% 平滑过渡到当前进度。数据驱动的值变化推荐用 CSS transition，不需要 JS 动画库。',
   react:'// 推荐：CSS transition 即可，库不提供专用组件\n<div className="progress-track">\n  <div\n    className="progress-fill"\n    style={{\n      width: percent + "%",\n      transition: "width 300ms ease"\n    }}\n  />\n</div>',
   vue:'<div class="progress-track">\n  <div\n    class="progress-fill"\n    :style="{\n      width: percent + \'%\',\n      transition: \'width 300ms ease\'\n    }"\n  />\n</div>',
   swift:'// 推荐：系统 UIProgressView 自带动画\nprogressView.setProgress(Float(percent) / 100, animated: true)\n\n// 自定义进度条：UIView.animate\nUIView.animate(withDuration: 0.3) {\n  self.fillWidthConstraint.constant = totalWidth * CGFloat(percent) / 100\n  self.progressTrack.layoutIfNeeded()\n}',
   kotlin:'// 推荐：系统 ProgressBar\nObjectAnimator.ofInt(progressBar, "progress", newProgress)\n  .setDuration(300)\n  .start()\n\n// 自定义进度条：ObjectAnimator 改宽度\nval targetWidth = (totalWidth * percent / 100).toInt()\nValueAnimator.ofInt(progressFill.width, targetWidth).apply {\n  duration = 300L\n  addUpdateListener {\n    progressFill.layoutParams.width = it.animatedValue as Int\n    progressFill.requestLayout()\n  }\n}.start()',
   cautions:['更新频率节流到 100ms','进度回退不要动画','不确定进度用 indeterminate'],
   tips:['CSS transition 最简单','完成时加 scale+color 庆祝效果']},
  {id:'typing', name:'打字点点', icon:'💬', desc:'聊天输入中、AI 回复等待', tags:['typing','循环'],
   effect:'TypingDots (库内置)', duration:500, easing:'expressive',
   scenario:'对方正在输入时显示三个点交替跳动。库内置 TypingDots 组件直接使用。',
   react:'import { TypingDots } from "@kinetic-motion/react";\n\n// 默认 3 个点，500ms 周期，150ms 交错\n<TypingDots />\n\n// 自定义：4 个点、6px 直径、600ms 周期\n<TypingDots\n  count={4}\n  dotSize={6}\n  gap={8}\n  cycleDuration={600}\n  staggerInterval={150}\n/>',
   vue:'<script setup>\nimport { TypingDots } from "@kinetic-motion/vue";\n<\/script>\n\n<!-- 默认 3 个点，500ms 周期，150ms 交错 -->\n<TypingDots />\n\n<!-- 自定义：4 个点、6px 直径、600ms 周期 -->\n<TypingDots :count="4" :dot-size="6" :gap="8" :cycle-duration="600" :stagger-interval="150" />',
   swift:'import FadeAnimation\n\n// 库内置 TypingDotsView\nlet dots = TypingDotsView()\nview.addSubview(dots)\ndots.startAnimating()\n\n// 停止\ndots.stopAnimating()',
   kotlin:'import com.fadeanimation.TypingDotsView\n\n// 库内置 TypingDotsView\nval dots = TypingDotsView(context)\ncontainer.addView(dots)\ndots.startAnimating()\n\n// 停止\ndots.stopAnimating()',
   cautions:['对方停止输入 2-3 秒后消失','三个点间隔 100-200ms','reduced-motion 用静态省略号'],
   tips:['库内置 TypingDots 组件(React + Vue)','点大小 6-8px，间距 4-6px']},
  {id:'wave', name:'波浪条', icon:'🎵', desc:'音频播放、语音输入、均衡器', tags:['wave','循环'],
   effect:'CSS scaleY + stagger 延迟', duration:300, easing:'ease-in-out',
   scenario:'语音消息播放时显示波浪条动画。循环动画用 CSS keyframes，交错延迟可用库的 stagger() 计算。',
   react:'import { stagger } from "@kinetic-motion/core";\n\n// 用 stagger() 生成延迟数组，CSS keyframes 做循环\nconst delays = stagger(4, { interval: 100 });\n\n// CSS:\n// .wave-bar {\n//   animation: wave 600ms ease-in-out infinite alternate;\n//   transform-origin: bottom;\n// }\n// @keyframes wave {\n//   0% { transform: scaleY(1); }\n//   100% { transform: scaleY(1.6); }\n// }\n\n<div className="wave-bars">\n  {delays.map((d, i) => (\n    <div key={i} className="wave-bar" style={{ animationDelay: d + "ms" }} />\n  ))}\n</div>',
   vue:'<script setup>\nimport { stagger } from "@kinetic-motion/core";\nconst delays = stagger(4, { interval: 100 });\n<\/script>\n<template>\n  <div class="wave-bars">\n    <div v-for="(d, i) in delays" :key="i"\n      class="wave-bar"\n      :style="{ animationDelay: d + \'ms\' }" />\n  </div>\n</template>',
   swift:'// 循环动画 iOS 用 CABasicAnimation 最稳定，库的 MotionAnimator 不做循环\n// 交错延迟可用库的 stagger()；此处为无限循环 beginTime，直接用下标乘间隔\nlet staggerInterval: TimeInterval = 0.1\nbars.enumerated().forEach { i, bar in\n  let anim = CABasicAnimation(keyPath: "transform.scale.y")\n  anim.fromValue = 1\n  anim.toValue = 1.6\n  anim.duration = 0.3\n  anim.beginTime = CACurrentMediaTime() + Double(i) * staggerInterval\n  anim.autoreverses = true\n  anim.repeatCount = .infinity\n  anim.timingFunction = CAMediaTimingFunction(name: .easeInEaseOut)\n  bar.layer.add(anim, forKey: "wave")\n}',
   kotlin:'// 交错延迟可用库的 stagger()；此处为无限循环，直接用下标乘间隔\nval staggerInterval = 100L\nbars.forEachIndexed { i, bar ->\n  ObjectAnimator.ofFloat(bar, "scaleY", 1f, 1.6f).apply {\n    duration = 300L\n    startDelay = i * staggerInterval\n    repeatCount = ValueAnimator.INFINITE\n    repeatMode = ValueAnimator.REVERSE\n    interpolator = AccelerateDecelerateInterpolator()\n  }.start()\n}',
   cautions:['3-7 根条','每根延迟有规律','真实音频应响应数据','reduced-motion 用静态图标'],
   tips:['scaleY 比改 height 性能好','真实可视化需 Web Audio API']},
  {id:'count-up', name:'数字滚动', desc:'数字从 0 滚动到目标值，常用于数据统计展示', tags:['counter','数据'],
   effect:'count-up', duration:1500, easing:'easeOutCubic',
   scenario:'仪表盘数据加载完成后，关键指标数字从 0 滚动到实际值。',
   react:'// 数字滚动动画\nfunction CountUp({ target, duration = 1500 }) {\n  const [val, setVal] = useState(0);\n  useEffect(() => {\n    let t0 = 0;\n    function tick(now) {\n      if(!t0) t0 = now;\n      const t = Math.min((now-t0)/duration, 1);\n      const e = 1 - Math.pow(1-t, 3); // easeOutCubic\n      setVal(Math.round(target * e));\n      if(t < 1) requestAnimationFrame(tick);\n    }\n    requestAnimationFrame(tick);\n  }, [target]);\n  return <span>{val.toLocaleString()}</span>;\n}',
   vue:'// 同 React，用 requestAnimationFrame 驱动',
   swift:'// CADisplayLink 驱动\nvar current = 0.0\nfunc tick() {\n  let t = min(elapsed / 1.5, 1)\n  let e = 1 - pow(1-t, 3)\n  label.text = String(Int(Double(target) * e))\n}',
   kotlin:'ValueAnimator.ofInt(0, target).apply {\n  duration = 1500\n  interpolator = DecelerateInterpolator(2f)\n  addUpdateListener { textView.text = (it.animatedValue as Int).toString() }\n}.start()',
   cautions:['大数字用 toLocaleString 加千分位','duration 1-2 秒为佳','小数点精度要固定','reduced-motion 直接显示最终值'],
   tips:['easeOutCubic 让前快后慢更有冲击力','配合 fade-in 一起出现','金额类加货币符号前缀']},
],
list: [
  {id:'stagger', name:'交错进入', icon:'📋', desc:'列表项依次出现', tags:['stagger','编排'],
   effect:'FadeGroup + stagger', duration:300, easing:'enter',
   scenario:'Feed 流加载完成后卡片从上到下依次淡入。库内置 FadeGroup 组件自动编排（当前只做 fade；需要 scale/slide 组合请手动用 Motion + stagger）。',
   react:'import { FadeGroup, Motion } from "@kinetic-motion/react";\nimport { stagger } from "@kinetic-motion/core";\n\n// 方式 A：只做 fade — 直接用 FadeGroup\n<FadeGroup\n  in={loaded}\n  intent="enter"\n  stagger={{ interval: 60 }}\n>\n  {items.map(item => (\n    <Card key={item.id}>{item.content}</Card>\n  ))}\n</FadeGroup>\n\n// 方式 B：scale+fade 组合 — 手动用 stagger + Motion\nconst delays = stagger(items.length, { interval: 60 });\n\n{items.map((item, i) => (\n  <Motion\n    key={item.id}\n    in={loaded}\n    effect="scale-fade-in"\n    intent="enter"\n    delay={delays[i]}\n  >\n    <Card>{item.content}</Card>\n  </Motion>\n))}',
   vue:'<!-- 方式 A：FadeGroup 只做 fade —— Vue 用扁平化 prop -->\n<FadeGroup\n  :in="loaded"\n  intent="enter"\n  :stagger-interval="60"\n>\n  <Card v-for="item in items" :key="item.id">{{ item.content }}</Card>\n</FadeGroup>\n\n<!-- 方式 B：scale+fade 组合 -->\n<script setup>\nimport { stagger } from "@kinetic-motion/core";\nconst delays = stagger(items.length, { interval: 60 });\n<\/script>\n<template>\n  <Motion\n    v-for="(item, i) in items"\n    :key="item.id"\n    :in="loaded"\n    effect="scale-fade-in"\n    intent="enter"\n    :delay="delays[i]"\n  >\n    <Card>{{ item.content }}</Card>\n  </Motion>\n</template>',
   swift:'import FadeAnimation\n\n// stagger() 现已在原生端提供，数值与 Web 完全一致\nlet delays = stagger(items.count, options: StaggerOptions(interval: 60))\n\nitems.enumerated().forEach { i, item in\n  MotionAnimator(\n    targetView: item.view,\n    options: FadeOptions(\n      duration: 300,\n      delay: delays[i],\n      intent: .enter\n    )\n  ).start(entering: true, effects: EffectPresets.scaleFadeIn)\n}',
   kotlin:'import com.fadeanimation.*\n\n// stagger() 现已在原生端提供，数值与 Web 完全一致\nval delays = stagger(items.size, StaggerOptions(interval = 60L))\n\nitems.forEachIndexed { i, item ->\n  MotionAnimator(\n    item.view,\n    FadeOptions(\n      duration = 300L,\n      delay = delays[i],\n      intent = MotionIntent.ENTER\n    )\n  ).start(entering = true, effects = EffectPresets.SCALE_FADE_IN)\n}',
   cautions:['元素>20个时缩短间隔','首屏可见才 stagger','避免 infinite scroll 中使用','控制在 10-15 个以内'],
   tips:['interval 50-80ms 最佳','center 方向适合从中间扩散','FadeGroup 已封装好']},
  {id:'reorder', name:'拖拽排序', icon:'↕️', desc:'列表拖拽重新排序', tags:['drag','spring'],
   effect:'useSpring + 外部拖拽库', duration:400, easing:'spring snappy',
   scenario:'长按列表项拖拽到新位置，其他项平滑让位。拖拽本身推荐接入 @dnd-kit / ItemTouchHelper 等成熟方案，松手回弹用库的 useSpring。',
   react:'import { DndContext } from "@dnd-kit/core";\nimport { SortableContext } from "@dnd-kit/sortable";\nimport { useSpring } from "@kinetic-motion/react";\n\n// 用 useSpring 做松手后的缩放回弹反馈\nfunction SortableCard({ isDragging }) {\n  // 拖拽时 active=true，松手时 active=false\n  const progress = useSpring(!isDragging, { config: "snappy" });\n  // progress 从 0 回弹到 1（可能轻微超过 1 表示过冲）\n  const scale = 1.05 - 0.05 * progress; // 拖拽 1.05 → 松手 1\n  return <Card style={{ transform: `scale(${scale})` }} />;\n}\n\n<DndContext onDragEnd={handleDragEnd}>\n  <SortableContext items={items}>\n    {items.map(i => <SortableCard key={i.id} id={i.id} />)}\n  </SortableContext>\n</DndContext>',
   vue:'<script setup>\nimport { computed, ref } from "vue";\nimport { useSpring } from "@kinetic-motion/vue";\n\nconst isDragging = ref(false);\n// useSpring 接受 Ref<boolean>，active=true 时弹簧从 0 跑到 1\nconst settling = ref(false);\nconst progress = useSpring(settling, { config: "snappy" });\n// 推荐结合 vuedraggable 做拖拽，useSpring 做松手回弹\n<\/script>',
   swift:'import FadeAnimation\n\n// iOS 拖拽用 UITableView 原生 reorder，松手时用 MotionAnimator 做缩放反馈\ntableView.dragDelegate = self\ntableView.dropDelegate = self\ntableView.dragInteractionEnabled = true\n\nfunc tableView(_ tv: UITableView, moveRowAt from: IndexPath, to: IndexPath) {\n  dataSource.move(from: from.row, to: to.row)\n  guard let cell = tv.cellForRow(at: to) else { return }\n  // 松手反馈：快速放大一下\n  MotionAnimator(targetView: cell, options: FadeOptions(preset: .fast)).start(\n    entering: true,\n    effects: [.scale(from: 1.05, to: 1.0)]\n  )\n}',
   kotlin:'import com.fadeanimation.*\n\n// Android 用 ItemTouchHelper 原生拖拽，松手时用 MotionAnimator 做反馈\nval callback = object : ItemTouchHelper.SimpleCallback(\n  ItemTouchHelper.UP or ItemTouchHelper.DOWN, 0\n) {\n  override fun onMove(rv: RecyclerView, vh: RecyclerView.ViewHolder,\n                      target: RecyclerView.ViewHolder): Boolean {\n    adapter.swap(vh.adapterPosition, target.adapterPosition)\n    return true\n  }\n\n  override fun clearView(rv: RecyclerView, vh: RecyclerView.ViewHolder) {\n    super.clearView(rv, vh)\n    // 松手反馈\n    MotionAnimator(vh.itemView, FadeOptions(preset = PresetSpeed.FAST)).start(\n      entering = true,\n      effects = listOf(MotionEffect.Scale(from = 1.05f, to = 1.0f))\n    )\n  }\n\n  override fun onSwiped(vh: RecyclerView.ViewHolder, dir: Int) {}\n}\nItemTouchHelper(callback).attachToRecyclerView(recyclerView)',
   cautions:['拖拽中元素要有视觉区分(阴影/scale)','其他元素平滑让位','松手用 spring 归位','长列表支持自动滚动'],
   tips:['Web: @dnd-kit 最佳','iOS: UITableView 原生支持','Android: ItemTouchHelper']},
  {id:'swipe-delete', name:'滑动删除', icon:'🗑', desc:'邮件/消息左滑删除', tags:['swipe','手势'],
   effect:'slide + collapse', duration:300, easing:'exit',
   scenario:'点击删除后，用 Motion 播放"左滑出 + 折叠"组合动画，动画结束才移除数据。手势识别本身用外部库或平台原生。',
   react:'import { Motion } from "@kinetic-motion/react";\n\n// 删除组合动画：左滑出 + 折叠高度\n<Motion\n  in={!deleted}\n  effect={[\n    { type: "slide", direction: "left", distance: 120 },\n    { type: "collapse", collapsedHeight: 0 }\n  ]}\n  duration={300}\n  intent="exit"\n  onAnimationEnd={() => {\n    if (deleted) removeFromList(id);\n  }}\n>\n  <ListItem />\n</Motion>',
   vue:'<Motion\n  :in="!deleted"\n  :effect="[\n    { type: \'slide\', direction: \'left\', distance: 120 },\n    { type: \'collapse\', collapsedHeight: 0 }\n  ]"\n  :duration="300"\n  intent="exit"\n  @animation-end="onExitEnd"\n>\n  <ListItem />\n</Motion>',
   swift:'import FadeAnimation\n\nfunc deleteRow(at indexPath: IndexPath) {\n  guard let cell = tableView.cellForRow(at: indexPath) else { return }\n\n  // 左滑 + 折叠组合\n  MotionAnimator(\n    targetView: cell,\n    options: FadeOptions(duration: 300, intent: .exit)\n  ).start(\n    entering: false,\n    effects: [\n      .slide(direction: .left, distance: 120),\n      .collapse(collapsedHeight: .fixed(0))\n    ],\n    onEnd: { [weak self] in\n      self?.dataSource.remove(at: indexPath.row)\n      self?.tableView.deleteRows(at: [indexPath], with: .none)\n    }\n  )\n}',
   kotlin:'import com.fadeanimation.*\n\nfun deleteItem(position: Int) {\n  val vh = recyclerView.findViewHolderForAdapterPosition(position) ?: return\n\n  MotionAnimator(\n    vh.itemView,\n    FadeOptions(duration = 300L, intent = MotionIntent.EXIT)\n  ).start(\n    entering = false,\n    effects = listOf(\n      MotionEffect.Slide(SlideDirection.LEFT, 120f),\n      MotionEffect.Collapse(CollapseHeight.Fixed(0f))\n    ),\n    onEnd = {\n      dataSource.removeAt(position)\n      adapter.notifyItemRemoved(position)\n    }\n  )\n}',
   cautions:['滑动超过 40% 才触发','显示红色背景+删除图标','删除后有收起动画','提供撤销机制'],
   tips:['iOS: trailingSwipeActions 标准方案','Android: ItemTouchHelper+onChildDraw','删除后 Snackbar 提供撤销']},
  {id:'insert', name:'插入项', icon:'➕', desc:'新消息/新项插入列表', tags:['scale-fade','enter'],
   effect:'scale-fade-in', duration:250, easing:'enter',
   scenario:'发送消息后新消息项缩放淡入插入到列表底部。',

   vue:'<Motion\n  :in="isNew"\n  effect="scale-fade-in"\n  intent="enter"\n  :duration="250"\n>\n  <MessageItem />\n</Motion>',
   swift:'import FadeAnimation\n\n// 先插入数据，再在 cellForRow 返回的 cell 上触发动画\ntableView.insertRows(at: [IndexPath(row: 0, section: 0)], with: .none)\nDispatchQueue.main.async {\n  let ip = IndexPath(row: 0, section: 0)\n  guard let cell = self.tableView.cellForRow(at: ip) else { return }\n  cell.scaleFadeIn(options: FadeOptions(duration: 250, intent: .enter))\n}',
   kotlin:'import com.fadeanimation.*\n\nadapter.notifyItemInserted(0)\nrecyclerView.scrollToPosition(0)\nrecyclerView.post {\n  val vh = recyclerView.findViewHolderForAdapterPosition(0) ?: return@post\n  MotionAnimator(\n    vh.itemView,\n    FadeOptions(duration = 250L, intent = MotionIntent.ENTER)\n  ).start(entering = true, effects = EffectPresets.SCALE_FADE_IN)\n}',

  {id:'sequence', name:'序列动画', desc:'多步骤按顺序执行，每步完成后触发下一步', tags:['sequence','编排'],
   effect:'planSequence', duration:2360, easing:'expressive',
   scenario:'奖励弹窗中，遮罩淡入 -> 卡片弹出 -> 礼盒弹入 -> 金币弹入，每步完成后触发下一步。',
   react:'import { planSequence } from "@kinetic-motion/core";\n\nconst plan = planSequence([\n  { effects: [{type:"fade"}], duration: 350 },\n  { effects: [{type:"scale",from:0.3,to:1},{type:"fade"}], duration: 700, delay: 50 },\n  { effects: [{type:"scale",from:0,to:1}], duration: 500, delay: 70 },\n  { effects: [{type:"scale",from:0,to:1}], duration: 500, delay: 70 },\n]);\n// plan.stepDelays = [0, 400, 1220, 1790]\n// plan.totalDuration = 2360',
   vue:'// 同 React，用 planSequence 计算延迟\nconst plan = planSequence([...]);\n// 用 :delay 绑定每步延迟',
   swift:'import FadeAnimation\n\n// planSequence 现已在原生端提供，自动计算每步累计延迟\nfunc playSequence() {\n  let steps = [\n    SequenceStep(effects: [.fade(from:0,to:1)], duration: 350),\n    SequenceStep(effects: EffectPresets.scaleFadeIn, duration: 700, delay: 50),\n    SequenceStep(effects: [.scale(from:0,to:1)], duration: 500, delay: 70),\n  ]\n  let plan = planSequence(steps)\n  for (i, step) in steps.enumerated() {\n    let delay = TimeInterval(plan.stepDelays[i]) / 1000\n    DispatchQueue.main.asyncAfter(deadline: .now() + delay) {\n      MotionAnimator(targetView: views[i],\n        options: FadeOptions(duration: step.duration ?? 300))\n        .start(entering: true, effects: step.effects)\n    }\n  }\n}',
   kotlin:'import com.fadeanimation.*\n\n// planSequence 现已在原生端提供，自动计算每步累计延迟\nfun playSequence() {\n  val steps = listOf(\n    SequenceStep(effects = listOf(MotionEffect.Fade(0f, 1f)), duration = 350L),\n    SequenceStep(effects = EffectPresets.SCALE_FADE_IN, duration = 700L, delay = 50L),\n    SequenceStep(effects = listOf(MotionEffect.Scale(0f, 1f)), duration = 500L, delay = 70L),\n  )\n  val plan = planSequence(steps)\n  steps.forEachIndexed { i, step ->\n    handler.postDelayed({\n      MotionAnimator(views[i], FadeOptions(duration = step.duration ?: 300L))\n        .start(entering = true, effects = step.effects)\n    }, plan.stepDelays[i])\n  }\n}',
   cautions:['序列要有明确结束状态','每步延迟 50-150ms 为佳','序列中断时取消所有待执行步骤','不要在序列执行中允许重复触发','总时长不超过 2 秒'],
   tips:['用 planSequence() 自动计算累计延迟','iOS 用 DispatchQueue.main.asyncAfter','Android 用 Handler.postDelayed','适合奖励弹窗、引导流程等场景']},
  {id:'marquee', name:'跑马灯', icon:'📜', desc:'公告滚动、标签云、Logo 墙', tags:['marquee','循环'],
   effect:'CSS translateX 循环', duration:20000, easing:'linear',
   scenario:'公告栏文字从右向左持续滚动。匀速无限循环推荐用 CSS keyframes，库不做此类长时循环动画。',
   react:'// 库不提供 Marquee 组件；推荐用 CSS keyframes\n// .marquee-track { overflow: hidden; }\n// .marquee-content {\n//   display: inline-flex;\n//   animation: marquee 20s linear infinite;\n// }\n// @keyframes marquee {\n//   from { transform: translateX(0); }\n//   to   { transform: translateX(-50%); }\n// }\n\n<div className="marquee-track">\n  <div className="marquee-content">\n    {[...items, ...items].map((item, i) => (\n      <span key={i}>{item.text}</span>\n    ))}\n  </div>\n</div>',
   vue:'<div class="marquee-track">\n  <div class="marquee-content">\n    <span v-for="(item, i) in [...items, ...items]" :key="i">\n      {{ item.text }}\n    </span>\n  </div>\n</div>',
   swift:'// iOS 用 CABasicAnimation 做 position.x 循环\nlet anim = CABasicAnimation(keyPath: "position.x")\nanim.fromValue = contentLayer.position.x\nanim.toValue = contentLayer.position.x - contentLayer.bounds.width / 2\nanim.duration = 20\nanim.repeatCount = .infinity\nanim.timingFunction = CAMediaTimingFunction(name: .linear)\ncontentLayer.add(anim, forKey: "marquee")\n\n// 停止：contentLayer.removeAnimation(forKey: "marquee")',
   kotlin:'// Android 用 ObjectAnimator 循环平移\nval anim = ObjectAnimator.ofFloat(contentView, "translationX", 0f, -contentView.width / 2f).apply {\n  duration = 20_000L\n  repeatCount = ValueAnimator.INFINITE\n  interpolator = LinearInterpolator()\n}\nanim.start()\n\n// 停止：anim.cancel()',
   cautions:['内容复制一份实现无缝循环','速度适中','hover/touch 暂停','不要放可交互元素','reduced-motion 暂停'],
   tips:['CSS: translateX(-50%) + 复制内容','暂停: animation-play-state: paused','速度: duration = contentWidth / speed']},
],

  {id:'vip-shimmer', name:'VIP 流光扫过', desc:'VIP 卡片斜向光带循环扫过，营造高级感', tags:['shimmer','VIP','循环'],
   effect:'CSS translateX + rotate（项目级自建）', duration:3000, easing:'ease-in-out',
   scenario:'VIP 订阅卡片选中态，金色光带斜向扫过。库不提供 shimmer 组件，该效果由项目级自建（参考 continue-watching-widget/src/VipCardShimmer.tsx）。',
   react:'// 项目级自建组件示例（非库导出）\n// CSS keyframes + 渐变带：\n// .shimmer-sweep {\n//   position: absolute; inset: 0;\n//   background: linear-gradient(100deg,\n//     transparent 30%,\n//     rgba(255,255,255,0.2) 50%,\n//     transparent 70%);\n//   animation: sweep 3s ease-in-out infinite;\n// }\n// @keyframes sweep {\n//   0%   { transform: translateX(-100%) rotate(-25deg); }\n//   100% { transform: translateX(300%) rotate(-25deg); }\n// }\n\n<div className="vip-card">\n  <VipCardContent />\n  <div className="shimmer-sweep" aria-hidden="true" />\n</div>',
   vue:'<div class="vip-card">\n  <VipCardContent />\n  <div class="shimmer-sweep" aria-hidden="true" />\n</div>',
   swift:'// iOS 自建：CAGradientLayer + CABasicAnimation（不在库内，按需自建）\nlet shimmer = CAGradientLayer()\nshimmer.colors = [\n  UIColor.clear.cgColor,\n  UIColor.white.withAlphaComponent(0.3).cgColor,\n  UIColor.clear.cgColor\n]\nshimmer.startPoint = CGPoint(x: 0, y: 0.5)\nshimmer.endPoint = CGPoint(x: 1, y: 0.5)\nlet anim = CABasicAnimation(keyPath: "locations")\nanim.fromValue = [-1, -0.5, 0]\nanim.toValue = [1, 1.5, 2]\nanim.duration = 3\nanim.repeatCount = .infinity\nshimmer.add(anim, forKey: "shimmer")\ncardView.layer.addSublayer(shimmer)',
   kotlin:'// Android 自建：ValueAnimator 驱动自绘 Canvas（不在库内）\nclass ShimmerView @JvmOverloads constructor(\n  context: Context,\n  attrs: AttributeSet? = null\n) : View(context, attrs) {\n  private val anim = ValueAnimator.ofFloat(-1f, 2f).apply {\n    duration = 3000L\n    repeatCount = ValueAnimator.INFINITE\n    interpolator = AccelerateDecelerateInterpolator()\n    addUpdateListener { invalidate() }\n  }\n  fun start() = anim.start()\n  fun stop() = anim.cancel()\n}',
   cautions:['光带宽度不超过卡片宽度 20%','循环动画必须有停止机制','光带透明度不超过 0.4','reduced-motion 下停止动画'],
   tips:['duration 3s 是最佳循环时长','光带颜色用品牌色浅色版本','iOS 用 CAGradientLayer 性能最好']},
  {id:'spotlight', name:'聚光灯引导', icon:'🔦', desc:'新手引导、功能介绍', tags:['spotlight','引导'],
   effect:'自建 overlay + box-shadow', duration:300, easing:'enter',
   scenario:'新用户首次进入，聚光灯高亮"发布"按钮。库不提供引导组件，推荐用遮罩 + 库的 Fade 做淡入。',
   react:'import { Fade, Presence } from "@kinetic-motion/react";\n\n// 用 box-shadow 画"挖空"遮罩；用 Fade 控制整体淡入淡出\n<Presence>\n  {showGuide && (\n    <Fade key="spotlight" in intent="enter">\n      <div className="spotlight-overlay" onClick={onDismiss}>\n        <div\n          className="spotlight-hole"\n          style={{\n            left: rect.left - 8,\n            top: rect.top - 8,\n            width: rect.width + 16,\n            height: rect.height + 16,\n            // 关键：box-shadow 撑满屏幕形成遮罩\n            boxShadow: "0 0 0 9999px rgba(0,0,0,0.5)",\n            borderRadius: 8,\n          }}\n        />\n        <div className="spotlight-tip">点击这里发布</div>\n      </div>\n    </Fade>\n  )}\n</Presence>',
   vue:'<Presence>\n  <Fade v-if="showGuide" key="spotlight" in intent="enter">\n    <div class="spotlight-overlay" @click="onDismiss">\n      <div class="spotlight-hole" :style="holeStyle" />\n      <div class="spotlight-tip">点击这里发布</div>\n    </div>\n  </Fade>\n</Presence>',
   swift:'// iOS 推荐用第三方 Instructions 库或自建 overlay\n// 库侧可用 motion() 做遮罩淡入\nimport FadeAnimation\n\nlet overlay = SpotlightOverlayView(targetRect: publishBtn.frame)\nwindow.addSubview(overlay)\noverlay.alpha = 0\noverlay.motion(entering: true,\n  effects: EffectPresets.fadeIn,\n  options: FadeOptions(intent: .enter))',
   kotlin:'// Android 推荐用第三方 TapTargetView 或自建 overlay\n// 库侧可用 MotionAnimator 做遮罩淡入\nimport com.fadeanimation.*\n\nval overlay = SpotlightOverlayView(context, publishBtn)\nrootView.addView(overlay)\noverlay.alpha = 0f\nMotionAnimator(overlay, FadeOptions(intent = MotionIntent.ENTER))\n  .start(entering = true, effects = EffectPresets.FADE_IN)',
   cautions:['高亮区域不能阻止目标点击','比目标稍大(padding 8-12px)','多步引导有步骤指示','可随时跳过','完成后记录不再显示'],
   tips:['遮罩: box-shadow: 0 0 0 9999px rgba(0,0,0,.5)','iOS: Instructions 库','Android: TapTargetView']},
  {id:'zoom-in', name:'缩放进入', desc:'元素从小到大缩放出现，常用于图片预览和卡片展开', tags:['scale','fade','常用'],

gesture: [
  {id:'drag-spring', name:'拖拽回弹', icon:'🎯', desc:'拖拽松手后的弹性回弹', tags:['spring','物理'],
   effect:'useSpring (snappy preset)', duration:400, easing:'spring',
   scenario:'图片拖拽查看，松手后弹性回到原位。使用库的 useSpring hook，配合手势识别（自己写或用外部库）。弹簧无固定时长，此处 duration 仅为估算参考。',
   react:'import { useState, useRef } from "react";\nimport { useSpring } from "@kinetic-motion/react";\n\nfunction DragCard() {\n  const [dragging, setDragging] = useState(false);\n  const [offset, setOffset] = useState(0);\n  const startXRef = useRef(0);\n\n  // 松手时 dragging=false → useSpring 进度从 0 回弹到 1\n  // progress 用于把当前 offset 插值到 0\n  const progress = useSpring(!dragging, { config: "snappy" });\n  const visibleOffset = dragging ? offset : offset * (1 - progress);\n\n  return (\n    <div\n      style={{ transform: `translateX(${visibleOffset}px)` }}\n      onPointerDown={e => { setDragging(true); startXRef.current = e.clientX - offset; }}\n      onPointerMove={e => { if (dragging) setOffset(e.clientX - startXRef.current); }}\n      onPointerUp={() => setDragging(false)}\n    />\n  );\n}',
   vue:'<script setup>\nimport { ref } from "vue";\nimport { useSpring } from "@kinetic-motion/vue";\n\nconst dragging = ref(false);\nconst offset = ref(0);\n// progress 是 Ref<number>，从 0 弹到 1\nconst progress = useSpring(ref(false), { config: "snappy" });\n<\/script>',
   swift:'import UIKit\n// iOS UIKit 原生弹簧已足够好，不需要库的 spring\n@objc func handlePan(_ g: UIPanGestureRecognizer) {\n  let t = g.translation(in: view)\n  switch g.state {\n  case .changed:\n    cardView.transform = CGAffineTransform(translationX: t.x, y: 0)\n  case .ended, .cancelled:\n    let v = g.velocity(in: view).x\n    UIView.animate(\n      withDuration: 0.6,\n      delay: 0,\n      usingSpringWithDamping: 0.6,\n      initialSpringVelocity: abs(v) / 1000\n    ) {\n      self.cardView.transform = .identity\n    }\n  default: break\n  }\n}',
   kotlin:'// Android 推荐用 AndroidX SpringAnimation（库的 core spring 是跨端模型）\nimport androidx.dynamicanimation.animation.SpringAnimation\nimport androidx.dynamicanimation.animation.DynamicAnimation\n\nview.setOnTouchListener { v, e ->\n  when (e.actionMasked) {\n    MotionEvent.ACTION_MOVE -> {\n      v.translationX = e.rawX - startX\n      true\n    }\n    MotionEvent.ACTION_UP, MotionEvent.ACTION_CANCEL -> {\n      SpringAnimation(v, DynamicAnimation.TRANSLATION_X, 0f).apply {\n        spring.dampingRatio = 0.6f\n        spring.stiffness = 300f\n        setStartVelocity(velocityTracker.xVelocity)\n      }.start()\n      true\n    }\n    else -> false\n  }\n}',
   cautions:['初始速度来自手势释放速度','拖拽过程跟手，松手才 spring','spring 无固定时长','低端设备可降级为 transition'],
   tips:['useSpring snappy 预设适合快速回弹','iOS: UISpringTimingParameters','Android: SpringAnimation']},
  {id:'swipe-card', name:'卡片滑动', icon:'🃏', desc:'Tinder 风格左右滑', tags:['swipe','spring'],
   effect:'useSpring + 原生手势', duration:400, easing:'spring snappy',
   scenario:'左滑拒绝右滑喜欢，卡片跟手旋转，松手后飞出或回弹。手势部分自己写或用 @use-gesture/react。',
   react:'import { useState } from "react";\nimport { useSpring } from "@kinetic-motion/react";\n\nfunction SwipeCard({ onYes, onNo, onDismiss }) {\n  const [offset, setOffset] = useState(0);\n  const [settling, setSettling] = useState(false);\n  const [target, setTarget] = useState(0);\n\n  // 回弹/飞出时用 useSpring 驱动 offset → target\n  const progress = useSpring(settling, { config: "snappy", onRest: () => {\n    setSettling(false);\n    if (Math.abs(target) > 0) onDismiss();\n  } });\n  const visible = settling ? offset + (target - offset) * progress : offset;\n\n  function onPointerUp() {\n    if (Math.abs(offset) > 120) {\n      setTarget(offset > 0 ? window.innerWidth : -window.innerWidth);\n      offset > 0 ? onYes() : onNo();\n    } else {\n      setTarget(0);\n    }\n    setSettling(true);\n  }\n\n  return (\n    <div style={{\n      transform: `translateX(${visible}px) rotate(${visible * 0.05}deg)`\n    }} onPointerUp={onPointerUp} />\n  );\n}',
   vue:'// 思路同 React：useSpring 驱动松手后的 offset 收敛',
   swift:'// iOS 原生 spring 已足够\n@objc func handlePan(_ g: UIPanGestureRecognizer) {\n  let t = g.translation(in: view)\n  switch g.state {\n  case .changed:\n    card.transform = CGAffineTransform(translationX: t.x, y: 0)\n      .rotated(by: t.x / view.bounds.width * 0.3)\n  case .ended, .cancelled:\n    let v = g.velocity(in: view).x\n    if abs(t.x) > 100 {\n      // 飞出\n      let dir: CGFloat = t.x > 0 ? 1 : -1\n      UIView.animate(\n        withDuration: 0.4,\n        delay: 0,\n        usingSpringWithDamping: 0.8,\n        initialSpringVelocity: abs(v) / 1000,\n        animations: {\n          self.card.transform = CGAffineTransform(translationX: dir * self.view.bounds.width * 1.5, y: 0)\n            .rotated(by: dir * 0.5)\n        },\n        completion: { _ in\n          dir > 0 ? self.onYes() : self.onNo()\n        }\n      )\n    } else {\n      // 回弹\n      UIView.animate(withDuration: 0.4, delay: 0, usingSpringWithDamping: 0.6, initialSpringVelocity: abs(v) / 1000) {\n        self.card.transform = .identity\n      }\n    }\n  default: break\n  }\n}',
   kotlin:'// Android 用 SpringAnimation\nimport androidx.dynamicanimation.animation.*\n\nview.setOnTouchListener { v, e ->\n  when (e.actionMasked) {\n    MotionEvent.ACTION_MOVE -> {\n      val dx = e.rawX - startX\n      v.translationX = dx\n      v.rotation = dx / v.width * 15\n      true\n    }\n    MotionEvent.ACTION_UP -> {\n      val dx = v.translationX\n      if (Math.abs(dx) > 100) {\n        // 飞出\n        val target = if (dx > 0) v.width * 1.5f else -v.width * 1.5f\n        SpringAnimation(v, DynamicAnimation.TRANSLATION_X, target).apply {\n          spring.dampingRatio = 0.8f\n          spring.stiffness = 300f\n        }.start()\n      } else {\n        // 回弹\n        SpringAnimation(v, DynamicAnimation.TRANSLATION_X, 0f).start()\n        SpringAnimation(v, DynamicAnimation.ROTATION, 0f).start()\n      }\n      true\n    }\n    else -> false\n  }\n}',
   cautions:['拖拽时卡片跟手旋转','释放速度和位移都要判断','飞出沿释放方向','下一张卡片预备好'],
   tips:['旋转: translateX/screenWidth * 15deg','飞出后 spring 弹入下一张','左滑红色叠加，右滑绿色']},
  {id:'pinch-zoom', name:'捏合缩放', icon:'🔎', desc:'图片双指缩放、地图缩放', tags:['gesture','实时'],

var currentPage = 'intro';

// Track collapsed state of sidebar groups
var sidebarCollapsed = {};

function toggleSidebarGroup(catId) {
  sidebarCollapsed[catId] = !sidebarCollapsed[catId];
  var items = document.getElementById('sg-items-'+catId);
  var sg = items ? items.previousElementSibling : null;
  if(sg && items) {
    if(sidebarCollapsed[catId]) {
      sg.classList.add('collapsed');
      items.classList.add('collapsed');
      items.style.maxHeight = '0';
    } else {
      sg.classList.remove('collapsed');
      items.classList.remove('collapsed');
      items.style.maxHeight = items.scrollHeight + 'px';
      setTimeout(function(){ items.style.maxHeight = 'none'; }, 300);
    }
  }
}

function handleGroupTitleClick(catId) {
  // Click on category title text → go to overview and scroll to that category
  if(currentPage !== 'overview') {
    showPage('overview');
    setTimeout(function(){ scrollToCat(catId); }, 100);
  } else {
    scrollToCat(catId);
  }
}

function handleSidebarItemClick(catId, caseId) {
  if(currentPage === 'overview') {
    // Clear any previous highlight immediately
    document.querySelectorAll('.case').forEach(function(c){
      c.style.boxShadow = '';
      c.style.borderColor = '';
    });
    // On overview page, scroll to the corresponding card
    var card = document.querySelector('.case[data-case="'+caseId+'"]');
    if(card) {
      var offset = 80;
      var top = card.getBoundingClientRect().top + window.scrollY - offset;
      window.scrollTo({top: top, behavior:'smooth'});
      // Briefly highlight the card
      card.style.boxShadow = '0 0 0 2px var(--c), 0 12px 32px rgba(0,0,0,.4)';
      card.style.borderColor = 'var(--c)';
      setTimeout(function(){
        card.style.boxShadow = '';
        card.style.borderColor = '';
      }, 600);
    }
  } else {
    // On other pages, navigate to detail
    showPage('detail:'+catId+':'+caseId);
  }
}

function buildSidebar() {
  var sb = document.getElementById('sidebar');
  var h = '<div class="side-inner">';
  // "介绍" + "组件总览" + "更新内容"
  var ovOn = (currentPage === 'overview') ? ' on' : '';
  var cautOn = (currentPage === 'cautions') ? ' on' : '';
  h += '<div class="side-group" style="border-top:none">';
  h += '<div class="si si-top'+ovOn+'" onclick="showPage(\'overview\')">组件总览</div>';
  h += '<div class="si'+cautOn+'" style="display:flex;justify-content:space-between;align-items:center;padding:12px 8px 12px 24px" onclick="markCautionsRead();showPage(\'cautions\')">更新内容<span id="cautions-new-badge" style="font-family:Rubik;font-size:12px;font-weight:600;color:var(--ch);background:rgba(24,108,229,.1);padding:4px 8px;border-radius:8px;display:'+(localStorage.getItem('cautions_read')?'none':'inline')+'">NEW</span></div>';
  h += '</div>';
  // Detail page: extract current caseId
  var activeCaseId = '';
  if(currentPage.indexOf('detail:') === 0) activeCaseId = currentPage.split(':')[2];
  // List each category with its components
  Object.keys(CASES).forEach(function(catId){
    var nav = NAV.find(function(n){return n.id===catId;});
    if(!nav) return;
    var isCollapsed = sidebarCollapsed[catId] === true;
    var collapsedClass = isCollapsed ? ' collapsed' : '';
    h += '<div class="side-group">';
    h += '<div class="sg'+collapsedClass+'">';
    h += '<span class="sg-label" onclick="handleGroupTitleClick(\''+catId+'\')">'+nav.label+'</span>';
    h += '<svg class="sg-chevron" onclick="toggleSidebarGroup(\''+catId+'\')" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>';
    h += '</div>';
    h += '<div class="sg-items'+collapsedClass+'" id="sg-items-'+catId+'">';
    CASES[catId].forEach(function(c){
      var isOn = (c.id === activeCaseId) ? ' on' : '';
      h += '<div class="si'+isOn+'" data-case="'+c.id+'" data-cat="'+catId+'" onclick="handleSidebarItemClick(\''+catId+'\',\''+c.id+'\')">'+c.name+'</div>';
    });
    h += '</div>';
    h += '</div>';
  });
  h += '<div class="side-ver">V1.2.0</div>';
  h += '</div>';
  sb.innerHTML = h;
}

function scrollToCase(catId, caseId) {
  // First make sure we're on the overview page
  if(currentPage !== 'overview') showPage('overview');
  setTimeout(function(){
    var card = document.querySelector('.case[data-case="'+caseId+'"]');
    if(card) {
      var offset = 64 + 50 + 12;
      var top = card.getBoundingClientRect().top + window.scrollY - offset;
      window.scrollTo({top: top, behavior:'smooth'});
    }
  }, currentPage !== 'overview' ? 100 : 0);
}

function scrollToCat(catId) {
  var el = document.getElementById('cat-'+catId);
  if(el) {
    var offset = document.querySelector('.cat-tabs') ? document.querySelector('.cat-tabs').offsetHeight + 64 + 8 : 80;
    var top = el.getBoundingClientRect().top + window.scrollY - offset;
    window.scrollTo({top: top, behavior:'smooth'});
  }
}

// Sidebar does not scroll-spy — only changes on click

function showPage(pageId) {
  currentPage = pageId;
  buildSidebar();
  var ct = document.getElementById('content');
  
  // Re-trigger fade animation
  ct.style.animation='none';
  ct.offsetHeight; // force reflow
  ct.style.animation='';

  if(pageId === 'cautions') { ct.innerHTML = renderCautions(); }
  else if(pageId === 'intro') { ct.innerHTML = renderIntro(); }
  else if(pageId === 'overview') { ct.innerHTML = renderAllCases(); }
  else if(pageId.indexOf('detail:') === 0) {
    var parts = pageId.split(':');
    ct.innerHTML = renderDetail(parts[1], parts[2]);
  }
  else if(CASES[pageId]) { ct.innerHTML = renderCaseList(pageId); }
  else { ct.innerHTML = renderAllCases(); }
  
}

function renderAllCases() {

  h += '<p class="pg-d"><code>Kinetic UI</code> 为跨端应用提供了丰富的动效组件，覆盖弹窗、转场、反馈、加载、编排、引导、手势七大场景。支持 React、Vue、iOS Swift、Android Kotlin 四端统一 API，开箱即用。</p>';
  // Render each category
  var catKeys = Object.keys(CASES);

    h += '<div class="cat-sec" id="cat-'+catId+'">';
    h += '<h3>'+nav.label+' <span>'+cases.length+'</span></h3>';
    h += '<div class="cases">';
    cases.forEach(function(c){
      var engId = c.id.replace(/-/g,' ').replace(/\b\w/g,function(l){return l.toUpperCase();}).replace(/ /g,'');
      h += '<div class="case" data-case="'+c.id+'" data-name="'+c.name+'" data-desc="'+(c.desc||'')+'" onclick="showPage(\'detail:'+catId+':'+c.id+'\')" onmouseenter="playCardAnim(this,\''+c.id+'\')" onmouseleave="stopCardAnim(this)">';

  });

// Filter cards by search text (like Ant Design inline search)
function filterCards(q) {
  q = q.trim().toLowerCase();
  document.querySelectorAll('.case').forEach(function(card){
    var name = (card.dataset.name||'').toLowerCase();
    var desc = (card.dataset.desc||'').toLowerCase();
    card.style.display = (!q || name.indexOf(q)>=0 || desc.indexOf(q)>=0) ? '' : 'none';
  });
  // Hide empty category sections
  document.querySelectorAll('.cat-sec').forEach(function(sec){
    var visible = sec.querySelectorAll('.case:not([style*="display: none"])').length;
    sec.style.display = visible > 0 ? '' : 'none';
  });
}

function navTo(el, secId) {

  var nav = document.getElementById('dtNav');
  if(nav) nav.querySelectorAll('a').forEach(function(a){ a.classList.remove('on'); });

  var sec = document.getElementById(secId);
  if(sec) sec.scrollIntoView({behavior:'smooth'});
}

  shake: 'native', ripple: 'native', progress: 'native', 'count-up': 'native',
  // gesture — 手势决定
  'drag-spring': 'gesture', 'swipe-card': 'gesture', 'pinch-zoom': 'gesture', 'long-press': 'gesture',

// Current editor state (single active editor per page)
var _editorState = { duration: 300, easing: 'enter', intent: '', caseId: '', tab: 'react' };

function getEditorKind(cs) {
  return EDITABLE_KIND[cs.id] || 'custom';
}

function renderVisualEditor(cs) {
  var kind = getEditorKind(cs);
  var editable = kind === 'motion';

  // Seed initial state from the case's declared defaults
  var defaultDuration = cs.duration || 300;
  var validEasings = ['enter','exit','productive','expressive','linear'];
  var defaultEasing = validEasings.indexOf(cs.easing) >= 0 ? cs.easing : 'enter';

  _editorState.caseId = cs.id;
  _editorState.duration = defaultDuration;
  _editorState.easing = defaultEasing;
  _editorState.intent = '';
  _editorState.tab = 'react';

  var h = '<div class="dt-editor">';

  // Left panel — controls
  h += '<div class="dt-editor-panel">';
  var dis = editable ? '' : ' disabled';
  h += '<div class="dt-editor-row"><label>duration <span class="v" id="ed-duration-v">'+defaultDuration+'ms</span></label>';
  h += '<input type="range" min="50" max="1500" step="10" value="'+defaultDuration+'" oninput="updateEditor(\'duration\', this.value)"'+dis+'></div>';

  h += '<div class="dt-editor-row"><label>easing</label>';
  h += '<select onchange="updateEditor(\'easing\', this.value)"'+dis+'>';
  validEasings.forEach(function(e){
    var sel = e === defaultEasing ? ' selected' : '';
    h += '<option value="'+e+'"'+sel+'>'+e+'</option>';
  });
  h += '</select></div>';

  h += '<div class="dt-editor-row"><label>intent <span class="v" style="color:var(--t3);font-size:10px">(覆盖 easing+duration)</span></label>';
  h += '<select onchange="updateEditor(\'intent\', this.value)"'+dis+'>';
  h += '<option value="">（不设置）</option>';
  ['enter','exit','focus','feedback','delight'].forEach(function(i){
    h += '<option value="'+i+'">'+i+'</option>';
  });
  h += '</select></div>';

  h += '<div style="margin-top:auto;padding-top:8px"><button class="dt-editor-reset" onclick="replayEditorPreview()" style="position:static;display:block;width:100%">▶ 重新播放</button></div>';
  h += '</div>';

  // Right panel — live preview
  h += '<div class="dt-editor-preview" id="ed-preview" onclick="replayEditorPreview()">';
  h += getCasePreviewHTML(cs.id);
  h += '</div>';

  // Hint for non-motion kinds
  if(!editable) {
    var hintMap = {
      loop:    '💡 这是循环动画（CSS @keyframes / CABasicAnimation / ObjectAnimator 驱动），不通过 <code>&lt;Motion&gt;</code> 的 duration/easing props 调节。下方代码为推荐实现。',
      native:  '💡 这是平台原生动画（CAKeyframeAnimation、UIProgressView、UIView.animate 等），参数写死在平台代码中。下方代码为推荐实现。',
      gesture: '💡 手势类动效的时长/速度由用户操作决定（释放速度驱动 spring），不通过 Motion props 调节。下方代码为参考实现。',
      custom:  '💡 这是项目级自建组件或多步编排，参数内嵌在组件内部。下方代码展示如何接入该组件。'
    };
    h += '<div class="dt-editor-hint">' + hintMap[kind] + '</div>';
  }

  // Code block with platform tabs
  h += '<div class="dt-editor-code-wrap">';
  h += '<div class="dt-editor-tabs">';
  ['react','vue','swift','kotlin'].forEach(function(p, i){
    var on = p === 'react' ? ' on' : '';
    var label = p === 'react' ? 'React' : p === 'vue' ? 'Vue' : p === 'swift' ? 'iOS Swift' : 'Android Kotlin';
    h += '<button class="dt-editor-tab'+on+'" onclick="switchEditorTab(\''+p+'\')">'+label+'</button>';
  });
  h += '</div>';
  h += '<pre class="dt-editor-code" id="ed-code">'+escH(generateEditorCode(cs, 'react'))+'</pre>';
  h += '</div>';

  h += '</div>';
  return h;
}

function switchEditorTab(platform) {
  _editorState.tab = platform;
  document.querySelectorAll('.dt-editor-tab').forEach(function(t){
    t.classList.toggle('on', t.textContent.toLowerCase().indexOf(
      platform === 'react' ? 'react' : platform === 'vue' ? 'vue' : platform === 'swift' ? 'ios' : 'android'
    ) >= 0);
  });
  var cs = findCase(_editorState.caseId);
  var codeEl = document.getElementById('ed-code');
  if(cs && codeEl) codeEl.textContent = generateEditorCode(cs, platform);
}

function updateEditor(key, value) {
  if(key === 'duration') {
    _editorState.duration = parseInt(value, 10);
    var label = document.getElementById('ed-duration-v');
    if(label) label.textContent = _editorState.duration + 'ms';
  } else {
    _editorState[key] = value;
  }

  var cs = findCase(_editorState.caseId);
  if(cs) {
    var codeEl = document.getElementById('ed-code');
    if(codeEl) codeEl.textContent = generateEditorCode(cs, _editorState.tab);
  }

  replayEditorPreview();
}

function findCase(caseId) {
  var found = null;
  Object.keys(CASES).forEach(function(k){
    CASES[k].forEach(function(c){ if(c.id === caseId) found = c; });
  });
  return found;
}

/**
 * 生成四端代码。
 * - motion 类组件：按当前 state 的 duration/easing/intent 生成模板代码
 * - 其他类型：直接返回 CASES 里预写好的真实代码（循环/手势/自建组件的原始实现）
 */
function generateEditorCode(cs, platform) {
  var kind = getEditorKind(cs);

  // 非 motion 类：直接用 CASES 里的原始代码
  if(kind !== 'motion') {
    return cs[platform] || '// 该端暂无示例';
  }

  // motion 类：按当前参数生成模板
  var effect = cs.effect && cs.effect.indexOf(' ') < 0 && cs.effect.indexOf('+') < 0
    ? cs.effect : 'fade-in';

  var useIntent = !!_editorState.intent;

  if(platform === 'react') {
    var l = ['import { Motion } from "@kinetic-motion/react";', '', '<Motion'];
    l.push('  in={show}');
    l.push('  effect="' + effect + '"');
    if(useIntent) {
      l.push('  intent="' + _editorState.intent + '"');
    } else {
      l.push('  duration={' + _editorState.duration + '}');
      l.push('  easing="' + _editorState.easing + '"');
    }
    l.push('>');
    l.push('  <YourContent />');
    l.push('</Motion>');
    return l.join('\n');
  }

  if(platform === 'vue') {
    var l = ['<script setup>', 'import { Motion } from "@kinetic-motion/vue";', '<\/script>', '', '<template>', '  <Motion'];
    l.push('    :in="show"');
    l.push('    effect="' + effect + '"');
    if(useIntent) {
      l.push('    intent="' + _editorState.intent + '"');
    } else {
      l.push('    :duration="' + _editorState.duration + '"');
      l.push('    easing="' + _editorState.easing + '"');
    }
    l.push('  >');
    l.push('    <YourContent />');
    l.push('  </Motion>');
    l.push('</template>');
    return l.join('\n');
  }

  if(platform === 'swift') {
    var presetMap = { 'fade-in':'fadeIn', 'scale-fade-in':'scaleFadeIn', 'slide-up-in':'slideUpIn', 'slide-down-out':'slideDownOut', 'slide-left-in':'slideLeftIn', 'slide-right-in':'slideRightIn', 'flip-x-in':'flipXIn', 'flip-y-in':'flipYIn', 'collapse-in':'collapseIn' };
    var iosPreset = presetMap[effect] || 'fadeIn';
    var opts = [];
    if(useIntent) {
      opts.push('intent: .' + _editorState.intent);
    } else {
      opts.push('duration: ' + _editorState.duration);
      var curveMap = { enter:'.easeOut', exit:'.easeIn', productive:'.easeOut', expressive:'.easeInOut', linear:'.linear' };
      opts.push('curve: ' + (curveMap[_editorState.easing] || '.easeInOut'));
    }
    var l = ['import FadeAnimation', '', '// 在 UIView 上触发'];
    l.push('view.motion(');
    l.push('  entering: true,');
    l.push('  effects: EffectPresets.' + iosPreset + ',');
    l.push('  options: FadeOptions(' + opts.join(', ') + ')');
    l.push(')');
    return l.join('\n');
  }

  if(platform === 'kotlin') {
    var presetMap = { 'fade-in':'FADE_IN', 'scale-fade-in':'SCALE_FADE_IN', 'slide-up-in':'SLIDE_UP_IN', 'slide-down-out':'SLIDE_DOWN_OUT', 'slide-left-in':'SLIDE_LEFT_IN', 'slide-right-in':'SLIDE_RIGHT_IN', 'flip-x-in':'FLIP_X_IN', 'flip-y-in':'FLIP_Y_IN', 'collapse-in':'COLLAPSE_IN' };
    var preset = presetMap[effect] || 'FADE_IN';
    var l = ['import com.fadeanimation.*', ''];
    var opts = [];
    if(useIntent) {
      opts.push('intent = MotionIntent.' + _editorState.intent.toUpperCase());
    } else {
      opts.push('duration = ' + _editorState.duration + 'L');
      var interpMap = { enter:'DecelerateInterpolator()', exit:'AccelerateInterpolator()', productive:'DecelerateInterpolator()', expressive:'AccelerateDecelerateInterpolator()', linear:'LinearInterpolator()' };
      opts.push('interpolator = ' + (interpMap[_editorState.easing] || 'AccelerateDecelerateInterpolator()'));
    }
    l.push('MotionAnimator(');
    l.push('  view,');
    l.push('  FadeOptions(' + opts.join(', ') + ')');
    l.push(').start(entering = true, effects = EffectPresets.' + preset + ')');
    return l.join('\n');
  }

  return '';
}

/** 用 CSS transition 驱动单次 tween 预览 */
function tween(el, dur, easing, props) {
  var from = {};
  var to = {};
  Object.keys(props).forEach(function(k){
    from[k] = props[k][0];
    to[k] = props[k][1];
  });

  el.style.transition = 'none';
  Object.keys(from).forEach(function(k){ el.style[k] = from[k]; });
  void el.offsetWidth;

  var transitionProps = Object.keys(from).map(function(k){
    var cssProp = k === 'transform' ? 'transform' : k === 'filter' ? 'filter' : k;
    return cssProp + ' ' + dur + 'ms ' + easing;
  }).join(', ');
  el.style.transition = transitionProps;
  Object.keys(to).forEach(function(k){ el.style[k] = to[k]; });
}

function replayEditorPreview() {
  var preview = document.getElementById('ed-preview');
  if(!preview) return;
  var cs = findCase(_editorState.caseId);
  if(!cs) return;

  // Reset HTML
  preview.innerHTML = getCasePreviewHTML(_editorState.caseId);

  var kind = getEditorKind(cs);

  // 非 motion 类：沿用原有卡片级动画（hover 动画里那一套）
  if(kind !== 'motion') {
    setTimeout(function(){
      // 模拟 preview 为 case card，调用 playCardAnim
      var fake = { querySelector: function(sel){ return preview.querySelector(sel); } };
      if(typeof playCardAnim === 'function') playCardAnim(fake, _editorState.caseId);
    }, 30);
    return;
  }

  // motion 类：按当前 duration/easing/intent 驱动
  var dur, easingName;
  if(_editorState.intent && EDITOR_INTENT_DEFAULTS[_editorState.intent]) {
    dur = EDITOR_INTENT_DEFAULTS[_editorState.intent].duration;
    easingName = EDITOR_INTENT_DEFAULTS[_editorState.intent].easing;
  } else {
    dur = _editorState.duration;
    easingName = _editorState.easing;
  }
  var easingCurve = EDITOR_EASING_CURVES[easingName] || 'ease';

  var el = preview.querySelector('.cp-el');
  if(!el) return;

  // 根据 effect 选动画模板，没匹配就回退到 scale-fade-in
  var effect = cs.effect || 'fade-in';
  var template = PREVIEW_TEMPLATE[effect] || PREVIEW_TEMPLATE['scale-fade-in'];
  template(el, dur, easingCurve);
}
