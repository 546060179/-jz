function buildAIPrompt(catId, caseId, platform) {
  platform = platform || 'react';
  var cs = findCase(caseId);
  if(!cs) return '';
  var nav = NAV.find(function(n){ return n.id === catId; });
  var catLabel = nav ? nav.label : catId;
  var meta = AI_PLATFORM_META[platform] || AI_PLATFORM_META.react;
  var refCode = cs[platform] || cs.react || '// no reference available';

  var lines = [];
  lines.push('你是一名资深的' + meta.label + '工程师。请使用 Kinetic UI 动效组件库（' + meta.pkg + '，已安装）实现一个"' + cs.name + '"场景。');
  lines.push('');
  lines.push('## 分类');
  lines.push(catLabel);
  lines.push('');
  lines.push('## 动效描述');
  lines.push(cs.desc || '');
  if(cs.scenario) {
    lines.push('');
    lines.push('## 使用场景');
    lines.push(cs.scenario);
  }
  lines.push('');
  lines.push('## 推荐参数');
  if(cs.effect)   lines.push('- effect: ' + cs.effect);
  if(cs.duration) lines.push('- duration: ' + cs.duration + 'ms');
  if(cs.easing)   lines.push('- easing: ' + cs.easing);
  lines.push('');
  lines.push('## 参考实现（' + meta.label + '）');
  lines.push('```' + meta.codeFence);
  lines.push(refCode);
  lines.push('```');
  if(cs.cautions && cs.cautions.length) {
    lines.push('');
    lines.push('## 注意事项');
    cs.cautions.forEach(function(c){ lines.push('- ' + c); });
  }
  if(cs.tips && cs.tips.length) {
    lines.push('');
    lines.push('## 最佳实践');
    cs.tips.forEach(function(t){ lines.push('- ' + t); });
  }
  lines.push('');
  lines.push('## 要求');
  meta.requirements.forEach(function(r, i){ lines.push((i+1) + '. ' + r); });
  return lines.join('\n');
}

function copyAIPrompt(catId, caseId, btn) {
  var select = document.getElementById('ai-platform-select');
  var platform = (select && select.value) || 'react';
  var prompt = buildAIPrompt(catId, caseId, platform);
  var onSuccess = function(){
    var span = btn.querySelector('span');
    btn.classList.add('copied');
    if(span) span.textContent = '已复制 ✓';
    setTimeout(function(){
      btn.classList.remove('copied');
      if(span) span.textContent = '复制 AI Prompt';
    }, 1800);
  };
  if(navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(prompt).then(onSuccess).catch(function(){ fallbackCopy(prompt); onSuccess(); });
  } else {
    fallbackCopy(prompt);
    onSuccess();
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}

// Detail page right-nav scroll spy
var _dtNavTimer;
window.addEventListener('scroll', function(){
  var dtNav = document.getElementById('dtNav');
  if(!dtNav) return;
  clearTimeout(_dtNavTimer);
  _dtNavTimer = setTimeout(function(){
    var secs = ['dt-when','dt-demo','dt-editor-sec','dt-api','dt-cautions','dt-tips'];
    var active = '';
    secs.forEach(function(id){
      var el = document.getElementById(id);
      if(el && el.getBoundingClientRect().top < 120) active = id;
    });
    dtNav.querySelectorAll('a').forEach(function(a){
      a.classList.toggle('on', a.dataset.sec === active);
    });
  }, 60);
}, {passive:true});

function switchCaseTab(tab, bodyId, lang) {
  tab.parentElement.querySelectorAll('.ct-tab').forEach(function(t){t.classList.remove('on');});
  tab.classList.add('on');
  var ct = tab.closest('.ct');
  var body = document.getElementById(bodyId);
  if(ct && ct._codes && body) {
    body.textContent = ct._codes[lang] || '';
  }
}

function playCardAnim(card, caseId) {

    'continue-watching': function(){
      // 卡片预览简化版：滑入(slide-up) → 停留(hold) → 淡出文字/按钮(fade) → 收缩成小浮层 widget(shrink)
      // 保持原半透明背景，收尾成圆角缩略图浮层；不再中途翻成纯黑背景(旧版闪烁 bug)
      var easeOutCubic=function(t){return 1-Math.pow(1-t,3);};

        if(!el.isConnected)return;

    'drag-spring': function(){var p=-1,v=0;(function _t(){var sf=-120*p,df=-10*v;v+=(sf+df)/60;p+=v/60;if(Math.abs(v)<0.01&&Math.abs(p)<0.005)p=0;el.style.transform='translateX('+(p*18)+'px)';if(Math.abs(p)>0.004||Math.abs(v)>0.01)requestAnimationFrame(_t);else el.style.transform='translateX(0)';})();},
    'swipe-card': function(){el.style.transition='none';el.style.transform='translateX(0) rotate(0)';el.style.opacity='1';raf(function(){el.style.transition='all 0.8s ease';el.style.transform='translateX(20px) rotate(8deg)';el.style.opacity='0.2';setTimeout(function(){if(!el.isConnected)return;el.style.transition='all 0.5s cubic-bezier(.4,.14,.3,1)';el.style.transform='translateX(0) rotate(0)';el.style.opacity='1';},900);});},

    'bubble-expand': function(){
      // 和 preview-bubble-expand.html / iOS BubbleExpandView 一致：
      // scaleX 从右侧原点做阻尼谐振子弹簧展开(zeta=0.5, omega=9.0)，文字在 70% 淡入
      var body=el.querySelector('div');
      var txt=el.querySelector('span');
      if(!body) return;
      var dur=650, t0=0;
      function springBounce(t){
        if(t<=0)return 0;if(t>=1)return 1;
        var z=0.5,w=9.0;
        var wd=w*Math.sqrt(1-z*z);
        var env=Math.exp(-z*w*t);
        return 1-env*(Math.cos(wd*t)+(z/Math.sqrt(1-z*z))*Math.sin(wd*t));
      }
      body.style.transformOrigin='right center';
      body.style.transform='scaleX(0)';
      if(txt)txt.style.opacity='0';
      function tick(now){
        if(!el.isConnected) return;
        if(!t0)t0=now;
        var p=Math.min((now-t0)/dur,1);

        body.style.transform='scaleX('+Math.max(0.001,s)+')';
        if(p>0.7&&txt){txt.style.opacity=String(Math.min((p-0.7)/0.3,1));}
        if(p<1)requestAnimationFrame(tick);
        else{body.style.transform='scaleX(1)';if(txt)txt.style.opacity='1';}
      }
      requestAnimationFrame(tick);
    },
    'vip-shimmer': function(){var l=el.querySelector('div');if(l){l.style.animation='cShimmerSweep 3s ease-in-out infinite';l.style.willChange='transform';}},

    'slide-in': function(){el.style.transition='none';el.style.transform='translateX(20px)';el.style.opacity='0';raf(function(){el.style.transition='all 0.5s cubic-bezier(0,0,.3,1)';el.style.transform='translateX(0)';el.style.opacity='1';});},
    'bounce-in': function(){el.style.transition='none';el.style.transform='scale(0.3)';el.style.opacity='0';raf(function(){el.style.transition='all 0.6s cubic-bezier(0.34,1.56,0.64,1)';el.style.transform='scale(1)';el.style.opacity='1';});},
    'zoom-slide-in': function(){el.style.transition='none';el.style.transform='scale(0.9) translateY(32px)';el.style.opacity='0';raf(function(){el.style.transition='all 0.5s cubic-bezier(0,0,.3,1)';el.style.transform='scale(1) translateY(0)';el.style.opacity='1';});},
    'spin-in': function(){el.style.transition='none';el.style.transform='rotate(-180deg)';el.style.opacity='0';raf(function(){el.style.transition='all 0.6s cubic-bezier(.4,.14,.3,1)';el.style.transform='rotate(0)';el.style.opacity='1';});},
    'count-up': function(){var target=8642,dur=1500,t0=0;el.textContent='0';function tick(now){if(!el.isConnected)return;if(!t0)t0=now;var t=Math.min((now-t0)/dur,1);var e=1-Math.pow(1-t,3);el.textContent=Math.round(target*e).toLocaleString();if(t<1)requestAnimationFrame(tick);}requestAnimationFrame(tick);},
    'zoom-in': function(){el.style.transition='none';el.style.transform='scale(0.5)';el.style.opacity='0';raf(function(){el.style.transition='all 0.6s cubic-bezier(.4,.14,.3,1)';el.style.transform='scale(1)';el.style.opacity='1';});},
  };

  var fn = A[caseId];
  if(fn) fn();
}

// ============================================================
// SEARCH — optimized with highlight, keyboard nav, instant expand
// ============================================================
(function(){
  var input = document.querySelector('.hd-search');
  var drop = document.getElementById('searchDrop');
  if(!input || !drop) return;

  // Build flat index
  var idx = [];
  Object.keys(CASES).forEach(function(catId){
    var nav = NAV.find(function(n){return n.id===catId;});
    CASES[catId].forEach(function(c){
      idx.push({catId:catId, catLabel:nav?nav.label:'', id:c.id, name:c.name, desc:c.desc, tags:(c.tags||[]).join(' ')});
    });
  });

  var srIdx = -1;

  function highlightMatch(text, query) {
    if(!query) return escH(text);
    var safe = escH(text);
    var escaped = '';
    for(var i=0;i<query.length;i++){
      var c=query[i];
      if('.*+?^${}()|[]\\'.indexOf(c)>=0) escaped+='\\';
      escaped+=c;
    }
    var re = new RegExp('('+escaped+')','gi');
    return safe.replace(re, '<mark>$1</mark>');
  }

  function renderResults(q) {
    if(!q){ drop.classList.remove('show'); return; }
    var hits = idx.filter(function(item){
      return item.name.toLowerCase().indexOf(q)>=0 || item.desc.toLowerCase().indexOf(q)>=0 || item.tags.toLowerCase().indexOf(q)>=0 || item.catLabel.toLowerCase().indexOf(q)>=0;
    });
    srIdx = -1;
    if(!hits.length){
      drop.innerHTML='<div class="sr-empty">没有找到 "'+escH(q)+'" 相关动效</div>';
    } else {
      var h = '';
      hits.forEach(function(item, i){
        h += '<div class="sr-item" data-cat="'+item.catId+'" data-id="'+item.id+'" data-idx="'+i+'">';
        h += '<span>'+highlightMatch(item.name, q)+'</span>';
        h += '<span class="sr-desc">'+highlightMatch(item.desc, q)+'</span>';
        h += '<span class="sr-cat">'+item.catLabel+'</span>';
        h += '</div>';
      });
      h += '<div class="sr-hint"><span><kbd>↑</kbd><kbd>↓</kbd> 导航</span><span><kbd>Enter</kbd> 打开</span><span><kbd>Esc</kbd> 关闭</span></div>';
      drop.innerHTML = h;
    }
    drop.classList.add('show');
  }

  function updateActive() {
    drop.querySelectorAll('.sr-item').forEach(function(it, i){
      it.classList.toggle('sr-active', i === srIdx);
    });
    // Scroll active item into view within dropdown
    var active = drop.querySelector('.sr-active');
    if(active) active.scrollIntoView({block:'nearest'});
  }

  function selectItem(item) {
    var catId = item.dataset.cat, caseId = item.dataset.id;
    drop.classList.remove('show');
    input.value = '';
    input.blur();
    showPage('detail:'+catId+':'+caseId);
  }

  input.addEventListener('input', function(){
    renderResults(this.value.trim().toLowerCase());
  });

  input.addEventListener('focus', function(){
    if(this.value.trim()) renderResults(this.value.trim().toLowerCase());
  });

  drop.addEventListener('click', function(e){
    var item = e.target.closest('.sr-item');
    if(item) selectItem(item);
  });

  document.addEventListener('click', function(e){
    if(!e.target.closest('.hd-search-wrap')) drop.classList.remove('show');
  });

  document.addEventListener('keydown', function(e){
    // Cmd/Ctrl+K to focus search
    if((e.metaKey||e.ctrlKey) && e.key==='k'){ e.preventDefault(); input.focus(); input.select(); return; }
    if(e.key==='Escape'){ drop.classList.remove('show'); input.blur(); srIdx=-1; return; }
    if(!drop.classList.contains('show')) return;
    var items = drop.querySelectorAll('.sr-item');
    if(!items.length) return;
    if(e.key==='ArrowDown'){ e.preventDefault(); srIdx = Math.min(srIdx+1, items.length-1); updateActive(); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); srIdx = Math.max(srIdx-1, 0); updateActive(); }
    else if(e.key==='Enter' && srIdx>=0 && items[srIdx]){ e.preventDefault(); selectItem(items[srIdx]); srIdx=-1; }
  });
})();

// ============================================================
// MOBILE NAV
// ============================================================
function buildMobNav(){
  var mn = document.getElementById('mobNav');
  if(!mn) return;
  mn.innerHTML = NAV.filter(function(n){ return n.id !== 'cautions'; }).map(function(n){
    return '<a class="'+(currentPage===n.id?'on':'')+'" onclick="showPage(\''+n.id+'\')">'+n.label+'</a>';
  }).join('');
}

// ============================================================
// COPY CODE BUTTON
// ============================================================
document.addEventListener('click', function(e){
  var btn = e.target.closest('.ct-copy');
  if(!btn) return;
  var body = btn.closest('.ct').querySelector('.ct-body');
  if(!body) return;
  var text = body.textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){
      btn.textContent='已复制';
      setTimeout(function(){ btn.textContent='复制'; }, 1500);
    });
  } else {
    // Fallback
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent='已复制';
    setTimeout(function(){ btn.textContent='复制'; }, 1500);
  }
});

// Override showPage to also build mobile nav
var _origShowPage = showPage;
showPage = function(pageId) {
  _origShowPage(pageId);
  buildMobNav();
  // Sync URL hash
if (pageId === 'overview') {
    history.replaceState(null, '', window.location.pathname);
  } else {
    history.pushState(null, '', '#' + pageId);
  }
  // Scroll to top when navigating
  window.scrollTo(0, 0);
  // Add copy buttons to code blocks
  document.querySelectorAll('.ct').forEach(function(ct){
    if(!ct.querySelector('.ct-copy')){
      var btn = document.createElement('button');
      btn.className = 'ct-copy';
      btn.textContent = '复制';
      ct.appendChild(btn);
    }
  });
};

// ============================================================
// BACK TO TOP
// ============================================================
(function(){
  var btn = document.getElementById('backTop');
  if(!btn) return;
  window.addEventListener('scroll', function(){
    btn.classList.toggle('show', window.scrollY > 400);
  }, {passive:true});
})();

// ============================================================
// TAG FILTER (removed — search replaces this)
// ============================================================

// Sidebar scrollbar: show only while scrolling
(function(){
  var _scrollTimer;
  function bindSideScroll(){
    var inner = document.querySelector('.side-inner');
    if(!inner) return;
    inner.addEventListener('scroll', function(){
      inner.classList.add('scrolling');
      clearTimeout(_scrollTimer);
      _scrollTimer = setTimeout(function(){ inner.classList.remove('scrolling'); }, 800);
    }, {passive:true});
  }
  bindSideScroll();
  // Re-bind after sidebar rebuild
  var _origBuild = window.buildSidebar;
  window.buildSidebar = function(){ _origBuild(); bindSideScroll(); };
})();

// Sidebar resize drag
(function(){
  var handle = document.getElementById('sideResize');
  var side = document.getElementById('sidebar');
  var main = document.querySelector('.main');
  if(!handle || !side) return;
  var dragging = false;
  handle.addEventListener('mousedown', function(e){
    e.preventDefault();
    dragging = true;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', function(e){
    if(!dragging) return;
    var w = Math.max(190, Math.min(500, e.clientX));
    side.style.width = w + 'px';
    if(main) main.style.marginLeft = w + 'px';
  });
  document.addEventListener('mouseup', function(){
    if(!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// Init
buildSidebar();

// Handle URL hash navigation (e.g., #detail:popup:modal)
var initHash = window.location.hash.replace('#', '');
if (initHash && initHash.indexOf('detail:') === 0) {
  showPage(initHash);
} else if (initHash && CASES[initHash]) {
  showPage(initHash);
} else {
  showPage('overview');
}

// Listen for hash changes (direct URL navigation)
window.addEventListener('hashchange', function() {
  var hash = window.location.hash.replace('#', '');
  if (hash && hash.indexOf('detail:') === 0) {
    showPage(hash);
  } else if (hash && CASES[hash]) {
    showPage(hash);
  }
});

// Listen for browser back/forward
window.addEventListener('popstate', function() {
  var hash = window.location.hash.replace('#', '');
  if (hash && hash.indexOf('detail:') === 0) {
    _origShowPage(hash);
    buildMobNav();
  } else if (hash && CASES[hash]) {
    _origShowPage(hash);
    buildMobNav();
  } else {
    _origShowPage('overview');
    buildMobNav();
  }
});

buildMobNav();
</script>
