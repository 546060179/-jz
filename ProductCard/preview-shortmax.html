<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=375">
<title>ShortMax 商品卡片预览 — Figma 设计稿还原</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Montserrat', -apple-system, sans-serif;
    background: #111218;
    color: #fff;
    min-height: 100vh;
    max-width: 375px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* 状态栏 */
  .status-bar {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 21px;
    font-size: 15px;
    font-weight: 600;
  }

  /* 搜索栏 */
  .search-bar {
    margin: 0 16px;
    height: 32px;
    background: rgba(255,255,255,0.1);
    border: 0.5px solid rgba(255,255,255,0.25);
    border-radius: 4px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    backdrop-filter: blur(10px);
  }
  .search-bar input {
    flex: 1;
    background: none;
    border: none;
    color: #828386;
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 500;
    outline: none;
  }
  .search-icon { font-size: 12px; opacity: 0.6; }

  /* Tab 栏 */
  .tab-bar {
    display: flex;
    gap: 20px;
    padding: 0 16px;
    height: 32px;
    align-items: center;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-item {
    font-size: 14px;
    font-weight: 500;
    color: #9F9FA2;
    white-space: nowrap;
    cursor: pointer;
    position: relative;
    letter-spacing: -0.28px;
  }
  .tab-item.active {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0;
  }
  .tab-item.active::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 16px;
    height: 3px;
    background: linear-gradient(90deg, #FF710B, #FF351C);
    border-radius: 2px;
  }

  /* 子分类 */
  .sub-category {
    display: flex;
    align-items: center;
    padding: 4px 16px;
    gap: 12px;
  }
  .sub-label {
    flex: 1;
    font-size: 12px;
    font-weight: 500;
    color: #F6610F;
    letter-spacing: -0.24px;
  }
  .sub-arrow {
    width: 20px;
    height: 20px;
    background: rgba(246,97,15,0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #F6610F;
    font-size: 14px;
    font-weight: bold;
  }

  /* 3列网格 */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px 8px;
    padding: 12px 16px;
  }

  /* 卡片 */
  .card {
    cursor: pointer;
    opacity: 0;
    transform: translateY(20px);
    transition: transform 0.15s ease;
  }
  .card.visible {
    animation: cardFadeIn 0.3s ease-out forwards;
  }
  .card:active { transform: scale(0.96) !important; }

  @keyframes cardFadeIn {
    to { opacity: 1; transform: translateY(0); }
  }
  /* 淡出动画 */
  @keyframes cardFadeOut {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to { opacity: 0; transform: translateY(-10px) scale(0.9); }
  }
  .card.fade-out {
    animation: cardFadeOut 0.25s ease-in forwards;
  }

  /* 封面 */
  .cover-wrap {
    position: relative;
    width: 100%;
    height: 145px;
    border-radius: 4px;
    overflow: hidden;
  }
  .cover {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .cover-gradient {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 24px;
    background: linear-gradient(to bottom, rgba(17,18,24,0), rgba(17,18,24,0.5));
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 4px 2px;
    gap: 2px;
  }
  .play-icon { font-size: 8px; }
  .view-count {
    font-size: 10px;
    font-weight: 600;
    line-height: 16px;
  }

  /* 标签 */
  .tag {
    position: absolute;
    top: 0;
    right: 0;
    height: 14px;
    padding: 1px 4px;
    border-radius: 0 0 0 4px;
    font-size: 10px;
    font-weight: 500;
    line-height: 12px;
    text-align: center;
  }
  .tag-hot { background: #F60F32; }
  .tag-new { background: #34C11C; }
  .tag-dubbed { background: #0FA5F6; }
  .tag-vip {
    background: linear-gradient(187deg, #F3AD63 17%, #FFEACB 96%);
    color: #582D01;
  }

  /* 标题 */
  .card-title {
    font-size: 11px;
    font-weight: 500;
    line-height: 16px;
    color: #fff;
    margin-top: 8px;
    height: 34px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  /* 题材标签 */
  .genre-tag {
    margin-top: 4px;
    display: inline-flex;
    height: 16px;
    padding: 0 4px 2px;
    align-items: center;
    background: #23252A;
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 2px;
    font-size: 10px;
    font-weight: 500;
    color: #9F9FA2;
  }

  /* 排行榜标签 */
  .rank-tag {
    margin-top: 4px;
    display: inline-flex;
    height: 16px;
    padding: 0 4px;
    align-items: center;
    gap: 2px;
    background: rgba(246,15,50,0.2);
    border-radius: 2px;
    font-size: 10px;
    font-weight: 500;
    color: #F60F32;
  }

  /* 底部 Tab Bar */
  .tab-bar-bottom {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 375px;
    height: 83px;
    background: #191B21;
  }
  .tab-bar-items {
    display: flex;
    height: 53px;
    align-items: center;
  }
  .tab-bar-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 8px;
    cursor: pointer;
  }
  .tab-bar-item .icon { font-size: 20px; }
  .tab-bar-item .label {
    font-size: 10px;
    font-weight: 400;
    color: #9F9FA2;
    letter-spacing: 0.2px;
  }
  .tab-bar-item.active .label { color: #fff; }
  .home-indicator {
    width: 134px;
    height: 5px;
    background: #fff;
    border-radius: 100px;
    margin: 0 auto;
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
  }

  /* 控制按钮 */
  .controls {
    position: fixed;
    top: 50%;
    right: 8px;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 100;
  }
  .ctrl-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: rgba(246,97,15,0.9);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ctrl-btn:active { transform: scale(0.9); }
</style>
</head>
<body>

<div class="status-bar">
  <span>9:27</span>
  <span style="font-size:12px">📶 📡 🔋</span>
</div>

<div class="search-bar">
  <input type="text" placeholder="Lycan Princess Won't Be Your Luna" readonly>
  <span class="search-icon">🔍</span>
</div>

<div class="tab-bar">
  <span class="tab-item">Popular</span>
  <span class="tab-item">VIP</span>
  <span class="tab-item">Rankings</span>
  <span class="tab-item active">Categories</span>
  <span class="tab-item">Marriage</span>
  <span class="tab-item">Werewolf</span>
  <span class="tab-item">Fantasy</span>
</div>

<div class="sub-category">
  <span class="sub-label">Male · Werewolf Love</span>
  <span class="sub-arrow">›</span>
</div>

<div class="grid" id="grid"></div>

<!-- 动效控制按钮 -->
<div class="controls">
  <button class="ctrl-btn" onclick="replayEntrance()" title="重播入场动画">↻</button>
  <button class="ctrl-btn" onclick="fadeOutAll()" title="全部淡出">↓</button>
</div>

<div class="tab-bar-bottom">
  <div class="tab-bar-items">
    <div class="tab-bar-item active"><span class="icon">🏠</span><span class="label">Home</span></div>
    <div class="tab-bar-item"><span class="icon">🎬</span><span class="label">Short</span></div>
    <div class="tab-bar-item"><span class="icon">🎁</span><span class="label">Rewards</span></div>
    <div class="tab-bar-item"><span class="icon">📋</span><span class="label">My List</span></div>
    <div class="tab-bar-item"><span class="icon">👤</span><span class="label">Profile</span></div>
  </div>
  <div class="home-indicator"></div>
</div>

<script>

const dramas = [
  { title: "Lycan Princess Won't Be Your Luna", views: "667.3M", color: "#4A3580", tag: "hot", rankTag: "Monthly List Top5." },
  { title: "Sinful Love With Alphas", views: "93.3M", color: "#803545", tag: "new", genre: "Secret Baby" },
  { title: "Sweet Rebirth Fated Revenge", views: "667.3M", color: "#354580", genre: "Revenge" },
  { title: "Mommy, We Need Daddy! CEO's Escaped Wife Returns", views: "667.3M", color: "#806035", tag: "vip", genre: "CEO" },
  { title: "Sweet Rebirth Fated Revenge", views: "667.3M", color: "#358060", tag: "vip", genre: "Revenge" },
  { title: "The Forbidden Alpha", views: "667.3M", color: "#803535", tag: "hot" },
  { title: "Mommy, We Need Daddy! CEO's Escaped Wife Returns", views: "667.3M", color: "#355080", tag: "dubbed", genre: "CEO" },
  { title: "Sinful Love With Alphas", views: "667.3M", color: "#504580", tag: "dubbed", genre: "Secret Baby" },
  { title: "Sweet Rebirth Fated Revenge", views: "667.3M", color: "#458035", genre: "Revenge" },
];

const grid = document.getElementById('grid');

function renderCards() {
  grid.innerHTML = '';
  dramas.forEach((d, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.index = i;

    let tagHTML = '';
    if (d.tag === 'hot') tagHTML = '<span class="tag tag-hot">Hot</span>';
    else if (d.tag === 'new') tagHTML = '<span class="tag tag-new">New</span>';
    else if (d.tag === 'dubbed') tagHTML = '<span class="tag tag-dubbed">Dubbed</span>';
    else if (d.tag === 'vip') tagHTML = '<span class="tag tag-vip">VIP</span>';

    let bottomTag = '';
    if (d.rankTag) {
      bottomTag = `<div class="rank-tag">${d.rankTag} ›</div>`;
    } else if (d.genre) {
      bottomTag = `<div class="genre-tag">${d.genre}</div>`;
    }

    card.innerHTML = `
      <div class="cover-wrap">
        <div class="cover" style="background:${d.color}"></div>
        <div class="cover-gradient">
          <span class="play-icon">▶</span>
          <span class="view-count">${d.views}</span>
        </div>
        ${tagHTML}
      </div>
      <div class="card-title">${d.title}</div>
      ${bottomTag}
    `;

    card.addEventListener('click', () => {
      // 点击单张卡片 — fadeOut + 缩小消失
      card.style.animation = 'cardFadeOut 0.25s ease-in forwards';
      card.style.animationDelay = '0s';
      setTimeout(() => {
        card.style.animation = 'cardFadeIn 0.3s ease-out forwards';
      }, 600);
    });

    grid.appendChild(card);

    // 交错入场动画（模拟 FadeAnimation 的 stagger 效果）
    setTimeout(() => card.classList.add('visible'), i * 50);
  });
}

// 重播入场动画
function replayEntrance() {
  const cards = document.querySelectorAll('.card');
  cards.forEach(c => {
    c.classList.remove('visible', 'fade-out');
    c.style.animation = '';
    c.style.opacity = '0';
    c.style.transform = 'translateY(20px)';
  });
  // 重新触发
  setTimeout(() => {
    cards.forEach((c, i) => {
      setTimeout(() => c.classList.add('visible'), i * 50);
    });
  }, 100);
}

// 全部淡出
function fadeOutAll() {
  const cards = document.querySelectorAll('.card');
  cards.forEach((c, i) => {
    setTimeout(() => {
      c.classList.add('fade-out');
    }, i * 30);
  });
  // 1秒后重新入场
  setTimeout(() => {
    cards.forEach(c => {
      c.classList.remove('visible', 'fade-out');
      c.style.animation = '';
      c.style.opacity = '0';
      c.style.transform = 'translateY(20px)';
    });
    setTimeout(() => {
      cards.forEach((c, i) => {
        setTimeout(() => c.classList.add('visible'), i * 50);
      });
    }, 200);
  }, 1200);
}

renderCards();
</script>
</body>
</html>
