<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=375">
<title>商品卡片预览 — ShortMax</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
  }

  /* 导航栏 */
  .navbar {
    position: sticky; top: 0; z-index: 10;
    background: #fff;
    padding: 12px 16px;
    font-size: 17px; font-weight: 600;
    text-align: center;
    border-bottom: 0.5px solid #e0e0e0;
  }

  /* 瀑布流容器 */
  .waterfall {
    column-count: 2;
    column-gap: 10px;
    padding: 12px;
  }

  /* 卡片 */
  .card {
    break-inside: avoid;
    background: #fff;
    border-radius: 12px;
    margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    overflow: hidden;
    cursor: pointer;
    /* 入场动画初始状态 */
    opacity: 0;
    transform: translateY(20px);
    transition: transform 0.15s ease;
  }
  .card.visible {
    animation: cardEnter 0.3s ease-out forwards;
  }
  .card:active {
    transform: scale(0.96);
  }

  @keyframes cardEnter {
    to { opacity: 1; transform: translateY(0); }
  }

  /* 封面图 */
  .card-cover {
    width: 100%;
    display: block;
    border-radius: 12px 12px 0 0;
  }

  /* 卡片内容 */
  .card-body { padding: 8px; }
  .card-title {
    font-size: 13px; font-weight: 600;
    color: #1a1a1a;
    line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-bottom {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 6px;
  }
  .card-price {
    font-size: 15px; font-weight: 700;
    color: #FF4545;
  }
  .card-btn {
    background: #FF4545; color: #fff;
    border: none; border-radius: 14px;
    padding: 4px 14px;
    font-size: 12px; font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s ease;
  }
  .card-btn:active {
    transform: scale(0.95);
  }
  .card-btn.pulse {
    animation: btnPulse 0.2s ease;
  }
  @keyframes btnPulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(0.95); }
    100% { transform: scale(1); }
  }

  /* 标签 */
  .card-tag {
    position: absolute; top: 8px; left: 8px;
    background: rgba(0,0,0,0.55); color: #fff;
    font-size: 10px; padding: 2px 6px;
    border-radius: 4px;
  }
  .card-cover-wrap { position: relative; }
</style>
</head>
<body>

<div class="navbar">精选好剧</div>
<div class="waterfall" id="waterfall"></div>

<script>
const products = [
  { title: "热门短剧·霸道总裁爱上我", price: "¥6.00", h: 200, color: "#8C78D9", tag: "热播" },
  { title: "独家连载·重生之都市修仙", price: "¥12.00", h: 240, color: "#F28C8C", tag: "独家" },
  { title: "甜宠日常", price: "¥3.00", h: 180, color: "#66BAD9", tag: "甜宠" },
  { title: "悬疑推理·消失的第七天", price: "¥9.90", h: 220, color: "#F2C466", tag: "悬疑" },
  { title: "古装仙侠·九天玄女传", price: "¥15.00", h: 260, color: "#8CD18C", tag: "仙侠" },
  { title: "都市言情·余生请多指教", price: "¥6.00", h: 190, color: "#D98CB3", tag: "言情" },
  { title: "搞笑日常·我的奇葩室友", price: "¥1.00", h: 170, color: "#8CC8D9", tag: "搞笑" },
  { title: "虐恋情深·半生缘", price: "¥8.00", h: 230, color: "#D9A88C", tag: "虐恋" },
  { title: "校园青春·那些年", price: "¥5.00", h: 210, color: "#A8D98C", tag: "青春" },
  { title: "职场逆袭·打工人翻身记", price: "¥10.00", h: 250, color: "#8C8CD9", tag: "职场" },
];

const container = document.getElementById("waterfall");

products.forEach((p, i) => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="card-cover-wrap">
      <div class="card-cover" style="height:${p.h}px;background:${p.color};"></div>
      <span class="card-tag">${p.tag}</span>
    </div>
    <div class="card-body">
      <div class="card-title">${p.title}</div>
      <div class="card-bottom">
        <span class="card-price">${p.price}</span>
        <button class="card-btn" onclick="event.stopPropagation(); pulseBtn(this)">购买</button>
      </div>
    </div>
  `;
  container.appendChild(card);

  // 依次 fadeIn + slideIn，每张卡片延迟 0.05s
  setTimeout(() => card.classList.add("visible"), i * 50);
});

// 购买按钮脉冲
function pulseBtn(btn) {
  btn.classList.remove("pulse");
  void btn.offsetWidth; // 强制 reflow 重置动画
  btn.classList.add("pulse");
}
</script>
</body>
</html>
