<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=375">
<title>订阅弹窗动效预览 — ShortMax Figma 还原</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Montserrat', -apple-system, sans-serif;
    background: #111218;
    color: #fff;
    min-height: 100vh;
    max-width: 375px;
    margin: 0 auto;
    overflow: hidden;
    position: relative;
  }

  /* 背景页面（模拟 Figma 中的首页） */
  .bg-page {
    position: absolute;
    inset: 0;
    background: #111218;
    display: flex;
    flex-direction: column;
  }
  .bg-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px 8px;
    padding: 120px 16px 16px;
  }
  .bg-card {
    height: 145px;
    border-radius: 4px;
    opacity: 0.4;
  }

  /* 遮罩层 */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(17, 18, 24, 0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 48px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 10;
  }
  .overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }

  /* 弹窗卡片 */
  .popup-card {
    width: 279px;
    background: #23252A;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    transform: scale(0.85);
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
  }
  .overlay.visible .popup-card {
    transform: scale(1);
    opacity: 1;
    transition-delay: 0.1s;
  }
  /* 消失动效 */
  .overlay.dismissing .popup-card {
    transform: scale(0.85);
    opacity: 0;
    transition: transform 0.2s ease-in, opacity 0.2s ease-in;
    transition-delay: 0s;
  }
  .overlay.dismissing {
    opacity: 0;
    transition-delay: 0.1s;
  }

  /* 头部 */
  .popup-header {
    height: 125px;
    background: linear-gradient(to bottom, #573D23, #23252A);
    position: relative;
    overflow: hidden;
  }
  .popup-header::before {
    content: '';
    position: absolute;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(243,173,99,0.3) 0%, transparent 70%);
    top: -60px;
    left: -30px;
  }
  .popup-header::after {
    content: '';
    position: absolute;
    width: 300px;
    height: 100px;
    background: radial-gradient(ellipse, rgba(193,165,128,0.15) 0%, transparent 70%);
    bottom: -20px;
    left: -50px;
  }

  /* 关闭按钮 */
  .close-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 24px;
    height: 24px;
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 50%;
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    transition: transform 0.1s;
  }
  .close-btn:active { transform: scale(0.9); }

  /* 内容区 */
  .popup-body {
    padding: 0 16px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  /* "All Free" 标题 */
  .all-free {
    font-size: 24px;
    font-weight: 900;
    text-align: center;
    background: linear-gradient(90deg, #CD7FAC, #F3AE66 29%, #F8E4C3 81%, #F9D4A5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 2px 2px rgba(36,39,43,0.43);
    line-height: 32px;
  }

  /* 价格卡片 */
  .price-card-wrap { position: relative; width: 100%; }
  .promo-tag {
    position: absolute;
    top: -11px;
    right: 0;
    height: 20px;
    padding: 0 8px;
    background: linear-gradient(90deg, #FF710B, #FF351C);
    border-radius: 10px 10px 0 10px;
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 600;
    z-index: 1;
  }
  .promo-divider {
    width: 1px;
    height: 8px;
    background: rgba(255,255,255,0.4);
  }

  .price-card {
    background: #191B21;
    border: 1px solid rgba(193,165,128,0.15);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }
  .price-card::before {
    content: '';
    position: absolute;
    top: -97px;
    right: -274px;
    width: 435px;
    height: 135px;
    background: radial-gradient(ellipse, rgba(243,173,99,0.08) 0%, transparent 70%);
  }
  .price-card::after {
    content: '';
    position: absolute;
    top: -1px;
    right: -48px;
    width: 285px;
    height: 1px;
    background: radial-gradient(ellipse, rgba(254,218,164,0.3) 0%, transparent 70%);
  }

  .duration-tag {
    display: inline-flex;
    padding: 2px 8px;
    background: #573D23;
    border-radius: 0 0 10px 0;
    font-size: 10px;
    font-weight: 600;
    color: #FEDAA4;
    line-height: 16px;
  }

  .price-section {
    padding: 20px 12px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .price-row {
    display: flex;
    align-items: baseline;
    gap: 2px;
  }
  .price-amount {
    font-size: 28px;
    font-weight: 900;
    background: linear-gradient(90deg, #F6610F, #FEDAA4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 32px;
  }
  .price-unit {
    font-size: 12px;
    font-weight: 500;
    color: #FEDAA4;
  }

  /* 功能列表 */
  .features {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .feature-row {
    display: flex;
    gap: 4px;
  }
  .feature-item {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .feature-icon { font-size: 12px; width: 16px; text-align: center; }
  .feature-text {
    font-size: 9px;
    font-weight: 500;
    color: rgba(254,218,164,0.5);
    line-height: 16px;
  }

  /* 订阅按钮 */
  .subscribe-btn {
    width: 223px;
    height: 36px;
    background: linear-gradient(90deg, #FFEACB, #F3AD63);
    border: none;
    border-radius: 100px;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #582D01;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2px;
    transition: transform 0.1s;
  }
  .subscribe-btn:active { transform: scale(0.95); }

  .disclaimer {
    font-size: 9px;
    font-weight: 500;
    color: #9F9FA2;
    text-align: center;
    line-height: 12px;
    padding: 0 12px;
  }

  /* 触发按钮 */
  .trigger-area {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    display: flex;
    gap: 12px;
  }
  .trigger-btn {
    padding: 10px 20px;
    background: linear-gradient(90deg, #FF710B, #FF351C);
    border: none;
    border-radius: 20px;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .trigger-btn:active { transform: scale(0.95); }
  .trigger-btn.gold {
    background: linear-gradient(90deg, #FFEACB, #F3AD63);
    color: #582D01;
  }
</style>
</head>
<body>

<!-- 背景页面 -->
<div class="bg-page">
  <div class="bg-grid" id="bgGrid"></div>
</div>

<!-- 触发按钮 -->
<div class="trigger-area">
  <button class="trigger-btn" onclick="showPopup()">显示订阅弹窗</button>
  <button class="trigger-btn gold" onclick="showPopupSlow()">慢速动效</button>
</div>

<!-- 订阅弹窗 -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="popup-card" id="popupCard">
    <div class="popup-header"></div>
    <button class="close-btn" onclick="dismissPopup()">✕</button>
    <div class="popup-body">
      <div class="all-free">All Free</div>
      <div class="price-card-wrap">
        <div class="promo-tag">
          <span>23:40:12</span>
          <span class="promo-divider"></span>
          <span>20% Off</span>
        </div>
        <div class="price-card">
          <div class="duration-tag">For 3 weeks</div>
          <div class="price-section">
            <div class="price-row">
              <span class="price-amount">$14.99</span>
              <span class="price-unit">/week</span>
            </div>
            <div class="features">
              <div class="feature-row">
                <div class="feature-item">
                  <span class="feature-icon">🎬</span>
                  <span class="feature-text">Unlimited viewing</span>
                </div>
                <div class="feature-item">
                  <span class="feature-icon">📺</span>
                  <span class="feature-text">1080P quality</span>
                </div>
              </div>
              <div class="feature-row">
                <div class="feature-item">
                  <span class="feature-icon">🚫</span>
                  <span class="feature-text">No ads</span>
                </div>
                <div class="feature-item">
                  <span class="feature-icon">⬇️</span>
                  <span class="feature-text">Offline download</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <button class="subscribe-btn" onclick="dismissPopup()">Subscribe Now ↗</button>
      <div class="disclaimer">$14.99 for the first three weeks, then $19.99/week</div>
    </div>
  </div>
</div>

<script>

// 背景卡片
const bgColors = ['#4A3580','#803545','#354580','#806035','#358060','#803535','#355080','#504580','#458035'];
const bgGrid = document.getElementById('bgGrid');
bgColors.forEach(c => {
  const div = document.createElement('div');
  div.className = 'bg-card';
  div.style.background = c;
  bgGrid.appendChild(div);
});

const overlay = document.getElementById('overlay');
let isAnimating = false;

// 显示弹窗（模拟 FadeAnimation fadeIn + spring scale）
function showPopup() {
  if (isAnimating) return;
  isAnimating = true;
  overlay.classList.remove('dismissing');
  overlay.classList.add('visible');
  setTimeout(() => { isAnimating = false; }, 500);
}

// 慢速显示（演示用）
function showPopupSlow() {
  if (isAnimating) return;
  isAnimating = true;
  const card = document.getElementById('popupCard');
  overlay.style.transition = 'opacity 0.6s ease';
  card.style.transition = 'transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.6s ease';
  overlay.classList.remove('dismissing');
  overlay.classList.add('visible');
  setTimeout(() => {
    overlay.style.transition = '';
    card.style.transition = '';
    isAnimating = false;
  }, 1000);
}

// 消失弹窗（模拟 FadeAnimation fadeOut + scale 缩小）
function dismissPopup() {
  if (isAnimating) return;
  isAnimating = true;
  overlay.classList.add('dismissing');
  setTimeout(() => {
    overlay.classList.remove('visible', 'dismissing');
    isAnimating = false;
  }, 400);
}

// 点击遮罩关闭
function handleOverlayClick(e) {
  if (e.target === overlay) {
    dismissPopup();
  }
}

// 页面加载后自动显示
setTimeout(showPopup, 500);
</script>
</body>
</html>
