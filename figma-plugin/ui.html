<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Inter, sans-serif; font-size: 12px; color: #333; background: #fff; padding: 16px; }
.header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #e5e5e5; }
.header h1 { font-size: 14px; font-weight: 600; }
.header p { font-size: 11px; color: #888; margin-top: 2px; }
.sel-info { background: #f5f5f5; border-radius: 6px; padding: 10px 12px; margin-bottom: 16px; font-size: 11px; color: #666; }
.sel-info .name { font-weight: 600; color: #333; }
.warn { color: #f59e0b; }
.section { margin-bottom: 14px; }
.label { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
select, input[type="number"] { width: 100%; height: 32px; border: 1px solid #ddd; border-radius: 6px; padding: 0 10px; font-size: 12px; outline: none; }
select:focus, input:focus { border-color: #0d99ff; }
.row { display: flex; gap: 10px; }
.row > * { flex: 1; }
.btn { width: 100%; height: 36px; background: #0d99ff; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 8px; }
.btn:hover { background: #0b85e0; }
.btn:disabled { background: #ccc; cursor: not-allowed; }
.tabs { display: flex; border-bottom: 2px solid #e5e5e5; margin-bottom: 0; }
.tab { padding: 8px 16px; font-size: 12px; font-weight: 500; color: #888; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; }
.tab:hover { color: #333; }
.tab.active { color: #0d99ff; border-bottom-color: #0d99ff; }
.code { background: #1e1e1e; color: #d4d4d4; border-radius: 0 0 8px 8px; padding: 12px; font-family: monospace; font-size: 11px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; max-height: 180px; overflow-y: auto; position: relative; }
.copy { position: absolute; top: 8px; right: 8px; background: #333; color: #ccc; border: none; border-radius: 4px; padding: 4px 10px; font-size: 10px; cursor: pointer; }
.copy:hover { background: #555; color: #fff; }
.panel { display: none; position: relative; }
.panel.active { display: block; }
.hint { font-size: 10px; color: #999; margin-top: 8px; text-align: center; }
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>Motion Code Generator</h1>
    <p>Select element - Configure effect - Generate code</p>
  </div>
</div>
<div class="sel-info" id="selInfo"><span class="warn">Please select an element on canvas</span></div>
<div class="section">
  <div class="label">Effect Preset</div>
  <select id="preset"><option value="">-- Select preset --</option></select>
</div>
<div class="section">
  <div class="label">Motion Intent</div>
  <select id="intent">
    <option value="">None (default)</option>
    <option value="enter">enter</option>
    <option value="exit">exit</option>
    <option value="focus">focus</option>
    <option value="feedback">feedback</option>
    <option value="delight">delight</option>
  </select>
</div>
<div class="row">
  <div class="section">
    <div class="label">Timing</div>
    <select id="timing">
      <option value="t1">t1 - 100ms</option>
      <option value="t2">t2 - 150ms</option>
      <option value="t3" selected>t3 - 300ms</option>
      <option value="t4">t4 - 500ms</option>
      <option value="t5">t5 - 700ms</option>
    </select>
  </div>
  <div class="section">
    <div class="label">Delay (ms)</div>
    <input type="number" id="delay" value="0" min="0" step="50" />
  </div>
</div>
<div class="section">
  <div class="label">Custom Duration (ms)</div>
  <input type="number" id="customDuration" placeholder="Leave empty to use Timing" min="0" step="50" />
</div>
<button class="btn" id="genBtn" disabled>Generate Code</button>
<div id="output" style="display:none; margin-top:16px;">
  <div class="tabs">
    <div class="tab active" data-tab="react">React</div>
    <div class="tab" data-tab="android">Android</div>
    <div class="tab" data-tab="ios">iOS</div>
  </div>
  <div class="panel active" id="p-react"><div class="code"><span id="c-react"></span><button class="copy" data-p="react">Copy</button></div></div>
  <div class="panel" id="p-android"><div class="code"><span id="c-android"></span><button class="copy" data-p="android">Copy</button></div></div>
  <div class="panel" id="p-ios"><div class="code"><span id="c-ios"></span><button class="copy" data-p="ios">Copy</button></div></div>
  <div class="hint">Code based on @fade-animation library</div>
</div>
<script>
var sel = null;
window.onmessage = function(e) {
  var msg = e.data.pluginMessage;
  if (!msg) return;
  if (msg.type === 'init') {
    sel = msg.data.selection;
    updateSel();
    var s = document.getElementById('preset');
    msg.data.presets.forEach(function(p) {
      var o = document.createElement('option');
      o.value = p.key;
      o.textContent = p.key + ' - ' + p.description;
      s.appendChild(o);
    });
  }
  if (msg.type === 'selection-changed') {
    sel = msg.data;
    updateSel();
  }
  if (msg.type === 'code-generated') {
    document.getElementById('output').style.display = 'block';
    document.getElementById('c-react').textContent = msg.data.react;
    document.getElementById('c-android').textContent = msg.data.android;
    document.getElementById('c-ios').textContent = msg.data.ios;
  }
};
function updateSel() {
  var el = document.getElementById('selInfo');
  var btn = document.getElementById('genBtn');
  if (sel) {
    el.innerHTML = '<span class="name">' + sel.name + '</span> - ' + sel.type + ' - ' + sel.width + 'x' + sel.height;
    btn.disabled = false;
  } else {
    el.innerHTML = '<span class="warn">Please select an element on canvas</span>';
    btn.disabled = true;
  }
}
document.getElementById('genBtn').addEventListener('click', function() {
  var preset = document.getElementById('preset').value;
  if (!preset || !sel) return;
  var dur = document.getElementById('customDuration').value;
  var config = {
    preset: preset,
    intent: document.getElementById('intent').value,
    timing: document.getElementById('timing').value,
    customDuration: dur ? parseInt(dur) : undefined,
    delay: parseInt(document.getElementById('delay').value) || 0,
    nodeName: sel.name
  };
  parent.postMessage({ pluginMessage: { type: 'generate', config: config } }, '*');
});
document.querySelectorAll('.tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
    tab.classList.add('active');
    document.getElementById('p-' + tab.dataset.tab).classList.add('active');
  });
});
document.querySelectorAll('.copy').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var platform = btn.dataset.p;
    var code = document.getElementById('c-' + platform).textContent;
    var ta = document.createElement('textarea');
    ta.value = code;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = 'Copied!';
    setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
    parent.postMessage({ pluginMessage: { type: 'copy-notify', platform: platform } }, '*');
  });
});
document.getElementById('intent').addEventListener('change', function(e) {
  var map = { enter: 't3', exit: 't2', focus: 't2', feedback: 't1', delight: 't4' };
  var v = e.target.value;
  if (v && map[v]) document.getElementById('timing').value = map[v];
});
</script>
</body>
</html>
