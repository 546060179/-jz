<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图标动效</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
        }
        
        .icon-container {
            position: relative;
            width: 200px;
            height: 200px;
            cursor: pointer;
        }
        
        .icon-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a237e, #283593);
            border-radius: 40px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        .icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 140px;
            transition: all 0.3s ease;
        }
        
        .icon-path {
            fill: url(#gradient);
            transition: all 0.3s ease;
        }
        
        .icon-stripe {
            fill: rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
        }
        
        .icon-container:hover .icon-background {
            transform: scale(1.05);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
        }
        
        .icon-container:hover .icon {
            transform: translate(-50%, -50%) scale(1.1);
        }
        
        .icon-container:active .icon-background {
            transform: scale(0.95);
        }
        
        .icon-container:active .icon {
            transform: translate(-50%, -50%) scale(0.95);
        }
        
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(66, 165, 245, 0.4);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(66, 165, 245, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(66, 165, 245, 0);
            }
        }
        
        .pulse-effect {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="icon-container">
        <div class="icon-background"></div>
        <svg class="icon" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#ffffff"/>
                    <stop offset="100%" stop-color="#2196f3"/>
                </linearGradient>
            </defs>
            <!-- 主V形 -->
            <path class="icon-path" d="M25 20 L50 80 L75 20 Z"/>
            <!-- 条纹 -->
            <path class="icon-stripe" d="M30 35 L45 65 L40 70 L25 40 Z"/>
            <path class="icon-stripe" d="M35 45 L50 75 L45 80 L30 50 Z"/>
            <path class="icon-stripe" d="M65 35 L50 65 L55 70 L70 40 Z"/>
            <path class="icon-stripe" d="M60 45 L45 75 L50 80 L65 50 Z"/>
            <!-- 右侧小三角形 -->
            <path class="icon-path" d="M65 35 L75 20 L80 45 L70 55 Z"/>
        </svg>
    </div>
    
    <script>
        const iconContainer = document.querySelector('.icon-container');
        
        // 点击时添加脉冲效果
        iconContainer.addEventListener('click', function() {
            const background = this.querySelector('.icon-background');
            background.classList.add('pulse-effect');
            setTimeout(() => {
                background.classList.remove('pulse-effect');
            }, 2000);
        });
    </script>
</body>
</html>
