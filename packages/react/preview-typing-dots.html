<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=375, initial-scale=1.0" />
<title>TypingDots — 跑马灯动效预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111218;
    font-family: Montserrat, -apple-system, sans-serif;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px;
    gap: 32px;
  }
  h2 { font-size: 14px; font-weight: 600; color: #828386; }

  /* 聊天气泡容器 */
  .chat-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    width: 100%;
    max-width: 343px;
  }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #191B21;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: #F6610F;
    flex-shrink: 0;
  }
  .bubble-col {
    display: flex; flex-direction: column; gap: 4px;
  }
  .sender { font-size: 12px; color: #828386; }

  /* Keyframes for typing dots */
  @keyframes typing-dots-pulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.15); }
  }

  /* TypingDots 纯 CSS 实现（与 React 组件一致） */
  .typing-dots {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 12px;
    background: #23252A;
    border-radius: 0px 12px 12px 12px;
    height: 44px;
  }
  .typing-dots .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4C4B50;
    animation: typing-dots-pulse 800ms cubic-bezier(0.4, 0.14, 0.3, 1) infinite;
    will-change: opacity, transform;
  }
  .typing-dots .dot:nth-child(1) { animation-delay: 0ms; }
  .typing-dots .dot:nth-child(2) { animation-delay: 150ms; }
  .typing-dots .dot:nth-child(3) { animation-delay: 300ms; }

  /* 变体：更大的点 */
  .typing-dots.large .dot {
    width: 10px; height: 10px;
  }

  /* 变体：橙色主题 */
  .typing-dots.orange .dot {
    background: #F6610F;
  }

  /* 变体：4 个点 */
  .typing-dots.four .dot:nth-child(4) { animation-delay: 450ms; }

  /* 变体：快速 */
  .typing-dots.fast .dot {
    animation-duration: 500ms;
  }
  .typing-dots.fast .dot:nth-child(1) { animation-delay: 0ms; }
  .typing-dots.fast .dot:nth-child(2) { animation-delay: 100ms; }
  .typing-dots.fast .dot:nth-child(3) { animation-delay: 200ms; }

  .section { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 343px; }
  .label { font-size: 12px; color: #4C4B50; text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>
<body>

<h2>TypingDots 跑马灯动效 — ShortMax 对话框</h2>

<!-- 1. 默认效果：还原 Figma 设计 -->
<div class="section">
  <span class="label">Default — Figma 原始效果</span>
  <div class="chat-row">
    <div class="avatar">S</div>
    <div class="bubble-col">
      <span class="sender">Max</span>
      <div class="typing-dots" role="status" aria-label="Loading">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>
</div>

<!-- 2. 快速变体 -->
<div class="section">
  <span class="label">Fast — 更快的节奏</span>
  <div class="chat-row">
    <div class="avatar">S</div>
    <div class="bubble-col">
      <span class="sender">Max</span>
      <div class="typing-dots fast" role="status" aria-label="Loading">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>
</div>

<!-- 3. 橙色主题 -->
<div class="section">
  <span class="label">Orange Theme — 品牌色</span>
  <div class="chat-row">
    <div class="avatar">S</div>
    <div class="bubble-col">
      <span class="sender">Max</span>
      <div class="typing-dots orange" role="status" aria-label="Loading">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>
</div>

<!-- 4. 四个点 -->
<div class="section">
  <span class="label">4 Dots — 更多圆点</span>
  <div class="chat-row">
    <div class="avatar">S</div>
    <div class="bubble-col">
      <span class="sender">Max</span>
      <div class="typing-dots four" role="status" aria-label="Loading">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>
</div>

<!-- 5. 大尺寸 -->
<div class="section">
  <span class="label">Large — 更大的圆点</span>
  <div class="chat-row">
    <div class="avatar">S</div>
    <div class="bubble-col">
      <span class="sender">Max</span>
      <div class="typing-dots large" role="status" aria-label="Loading">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
