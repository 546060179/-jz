<script>
// ================================================================
// FRAME-PERFECT ANIMATION ENGINE
// Using Web Animations API + requestAnimationFrame for precise control
//
// Timeline (matching the Figma prototype video):
// Phase 1 (0-400ms): Banner slides up from below tabbar
// Phase 2 (400ms-3400ms): Banner stays visible, user can interact
// Phase 3 (3400ms-3700ms): Info/play/close fade out
// Phase 4 (3700ms-4200ms): Banner background shrinks to cover size
// Phase 5 (4200ms-4900ms): Cover morphs to floating widget position
// Phase 6 (4900ms+): Widget idle with play/close overlay
// ================================================================

const ac = document.getElementById('animContainer');
const phone = document.getElementById('phone');

// Figma-exact dimensions
const PHONE_W = 375, PHONE_H = 812;
const TABBAR_H = 83;
const BANNER_H = 68; // 4px top padding + 60px cover + 4px bottom padding
const COVER_W = 44.35, COVER_H = 60;
const WIDGET_W = 90, WIDGET_H = 120, WIDGET_R = 8;
const WIDGET_LEFT = 0, WIDGET_BOTTOM = TABBAR_H + 8;

let currentAnim = null;
let state = 'idle';
let timeScale = 1; // 1 = normal, 5 = 5x slower

// Banner HTML template (Figma-exact layout)
function bannerHTML(infoOpacity, playOpacity, closeOpacity) {
  return `
    <div style="display:flex;align-items:center;gap:12px;flex:1;min-width:0;">
      <img src="assets/banner_cover-ccc438.png" style="width:${COVER_W}px;height:${COVER_H}px;border-radius:4px;object-fit:cover;display:block;flex-shrink:0;">
      <div style="display:flex;flex-direction:column;gap:2px;flex:1;min-width:0;overflow:hidden;opacity:${infoOpacity};transition:opacity 0.3s ease;">
        <div style="font-size:12px;font-weight:600;color:#fff;line-height:1.33;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Genius Baby：daddy please take mommy away</div>
        <div style="font-size:10px;font-weight:500;color:#9F9FA2;line-height:1.6;">EP.1  /  EP.100</div>
      </div>
      <div style="flex-shrink:0;width:32px;height:32px;opacity:${playOpacity};transition:opacity 0.3s ease;">
        <svg width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="16" fill="#F6610F"/><path d="M13 9.5V22.5L24 16L13 9.5Z" fill="#fff"/></svg>
      </div>
    </div>
    <div id="bannerCloseBtn" style="flex-shrink:0;width:20px;height:20px;cursor:pointer;opacity:${closeOpacity};transition:opacity 0.3s ease;">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><line x1="4" y1="4" x2="16" y2="16" stroke="#9F9FA2" stroke-width="1.5" stroke-linecap="round"/><line x1="16" y1="4" x2="4" y2="16" stroke="#9F9FA2" stroke-width="1.5" stroke-linecap="round"/></svg>
    </div>`;
}

// Widget HTML template
function widgetHTML() {
  return `
    <img src="assets/banner_cover-ccc438.png" style="width:100%;height:100%;object-fit:cover;display:block;border-radius:inherit;">
    <div id="widgetPlayBtn" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);cursor:pointer;line-height:0;opacity:0;transition:opacity 0.35s ease;">
      <svg width="38" height="38" viewBox="0 0 38 38"><circle cx="19" cy="19" r="19" fill="rgba(0,0,0,0.45)"/><path d="M15.5 11V27L28 19L15.5 11Z" fill="#fff"/></svg>
    </div>
    <div id="widgetCloseBtn" style="position:absolute;right:-7px;top:-7px;cursor:pointer;line-height:0;opacity:0;transition:opacity 0.35s ease;">
      <svg width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="9" fill="rgba(0,0,0,0.55)"/><line x1="5.5" y1="5.5" x2="12.5" y2="12.5" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/><line x1="12.5" y1="5.5" x2="5.5" y2="12.5" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/></svg>
    </div>`;
}

// Utility: set ac position/size using bottom-based coordinates
function setBox(left, bottom, width, height, radius, bg, shadow, border) {
  ac.style.left = left + 'px';
  ac.style.bottom = bottom + 'px';
  ac.style.width = width + 'px';
  ac.style.height = height + 'px';
  ac.style.borderRadius = radius;
  ac.style.background = bg || '';
  ac.style.boxShadow = shadow || 'none';
  ac.style.border = border || 'none';
}

// Utility: lerp
function lerp(a, b, t) { return a + (b - a) * t; }

// Easing functions
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }
function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; }
function easeOutBack(t) { const c1=1.70158; const c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); }
function easeOutExpo(t) { return t === 1 ? 1 : 1 - Math.pow(2, -10 * t); }

// ================================================================
// MAIN ANIMATION SEQUENCE
// ================================================================
function runAnimation() {
  if (state !== 'idle') return;
  state = 'running';

  // Banner full-width state
  const B_LEFT = 0;
  const B_BOTTOM = TABBAR_H; // sits right on top of tabbar
  const B_WIDTH = PHONE_W;
  const B_RADIUS = '8px 8px 0 0';
  const B_BG = '#26282E';

  // Banner collapsed to just cover
  const C_WIDTH = COVER_W + 8; // 4px padding each side
  const C_HEIGHT = COVER_H + 8;
  const C_LEFT = 0;
  const C_BOTTOM = TABBAR_H;

  // Widget final state
  const W_LEFT = WIDGET_LEFT;
  const W_BOTTOM = WIDGET_BOTTOM;
  const W_WIDTH = WIDGET_W;
  const W_HEIGHT = WIDGET_H;

  // ---- Phase 1: Slide up ----
  ac.innerHTML = bannerHTML(1, 1, 1);
  ac.style.display = 'flex';
  ac.style.alignItems = 'center';
  ac.style.gap = '12px';
  ac.style.padding = '4px 16px 4px 4px';
  ac.style.overflow = 'hidden';
  ac.style.pointerEvents = 'auto';
  ac.style.opacity = '1';
  ac.style.transform = 'none';

  setBox(B_LEFT, B_BOTTOM, B_WIDTH, BANNER_H, B_RADIUS, B_BG, 'none', 'none');

  // Start off-screen (below)
  ac.style.transform = 'translateY(100%)';
  ac.style.opacity = '0';

  // Bind close button
  const closeBtn = document.getElementById('bannerCloseBtn');
  if (closeBtn) {
    closeBtn.addEventListener('click', () => {
      if (state === 'banner-visible') skipToCollapse();
    });
  }

  let startTime = null;
  let phase = 'slide-up';
  let collapseStartTime = null;

  function tick(now) {
    if (state === 'idle') return; // cancelled
    if (!startTime) startTime = now;
    const elapsed = now - startTime;

    if (phase === 'slide-up') {
      // 0 → 450ms: slide up with spring
      const dur = 450 * timeScale;
      const t = Math.min(elapsed / dur, 1);
      const e = easeOutCubic(t);
      ac.style.transform = `translateY(${(1 - e) * 100}%)`;
      ac.style.opacity = String(Math.min(t * 3, 1)); // fade in fast

      if (t >= 1) {
        ac.style.transform = 'none';
        ac.style.opacity = '1';
        phase = 'banner-wait';
        state = 'banner-visible';
        startTime = now;
      }
      requestAnimationFrame(tick);
    }
    else if (phase === 'banner-wait') {
      // Wait 3 seconds then auto-collapse
      if (elapsed >= 3000 * timeScale) {
        skipToCollapse();
      } else {
        requestAnimationFrame(tick);
      }
    }
    else if (phase === 'fade-content') {
      // 0 → 300ms: fade out info, play, close
      if (!collapseStartTime) collapseStartTime = now;
      const ce = now - collapseStartTime;
      const dur = 300 * timeScale;
      const t = Math.min(ce / dur, 1);
      const e = easeOutCubic(t);

      // Fade out text and buttons
      const info = ac.querySelector('div > div:nth-child(2)');
      const play = ac.querySelector('div > div:nth-child(3)');
      const close = ac.querySelector('#bannerCloseBtn');
      if (info) info.style.opacity = String(1 - e);
      if (play) play.style.opacity = String(1 - e);
      if (close) close.style.opacity = String(1 - e);

      if (t >= 1) {
        phase = 'shrink-banner';
        collapseStartTime = now;
      }
      requestAnimationFrame(tick);
    }
    else if (phase === 'shrink-banner') {
      // 0 → 400ms: shrink banner width from full to cover size
      const ce = now - collapseStartTime;
      const dur = 400 * timeScale;
      const t = Math.min(ce / dur, 1);
      const e = easeInOutCubic(t);

      const curW = lerp(B_WIDTH, C_WIDTH, e);
      const curH = lerp(BANNER_H, C_HEIGHT, e);
      const curR = t < 0.5 ? '8px 8px 0 0' : `${lerp(8, 4, (t-0.5)*2)}px`;

      ac.style.width = curW + 'px';
      ac.style.height = curH + 'px';
      ac.style.borderRadius = curR;
      ac.style.padding = `${lerp(4, 0, e)}px ${lerp(16, 0, e)}px ${lerp(4, 0, e)}px ${lerp(4, 0, e)}px`;

      // Fade out background
      const bgOpacity = lerp(1, 0, Math.max(0, (t - 0.5) * 2));
      ac.style.background = `rgba(38, 40, 46, ${bgOpacity})`;

      if (t >= 1) {
        phase = 'morph-to-widget';
        collapseStartTime = now;
        // Switch to widget content
        ac.innerHTML = widgetHTML();
        ac.style.display = 'block';
        ac.style.padding = '0';
        ac.style.overflow = 'visible';
        ac.style.background = 'none';

        // Start from cover position
        setBox(C_LEFT, C_BOTTOM, C_WIDTH, C_HEIGHT, '4px', 'none', 'none', 'none');
      }
      requestAnimationFrame(tick);
    }
    else if (phase === 'morph-to-widget') {
      // 0 → 550ms: morph from cover position to widget position with overshoot
      const ce = now - collapseStartTime;
      const dur = 550 * timeScale;
      const t = Math.min(ce / dur, 1);
      const e = easeOutBack(t);

      const curL = lerp(C_LEFT, W_LEFT, e);
      const curB = lerp(C_BOTTOM, W_BOTTOM, e);
      const curW = lerp(C_WIDTH, W_WIDTH, e);
      const curH = lerp(C_HEIGHT, W_HEIGHT, e);
      const curR = lerp(4, WIDGET_R, easeOutCubic(t));

      ac.style.left = curL + 'px';
      ac.style.bottom = curB + 'px';
      ac.style.width = curW + 'px';
      ac.style.height = curH + 'px';
      ac.style.borderRadius = curR + 'px';

      // Shadow fades in
      const shadowT = easeOutCubic(t);
      ac.style.boxShadow = `4px 4px 16px rgba(0,0,0,${shadowT * 0.4})`;
      ac.style.border = `1px solid rgba(255,255,255,${shadowT * 0.15})`;

      if (t >= 1) {
        phase = 'widget-idle';
        state = 'widget';
        ac.style.pointerEvents = 'auto';

        // Show play and close buttons
        const playBtn = document.getElementById('widgetPlayBtn');
        const closeBtn2 = document.getElementById('widgetCloseBtn');
        if (playBtn) playBtn.style.opacity = '1';
        if (closeBtn2) {
          closeBtn2.style.opacity = '1';
          closeBtn2.addEventListener('click', dismissWidget);
        }
        return; // stop animation loop
      }
      requestAnimationFrame(tick);
    }
  }

  function skipToCollapse() {
    if (phase !== 'banner-wait' && phase !== 'slide-up') return;
    phase = 'fade-content';
    state = 'collapsing';
    ac.style.pointerEvents = 'none';
    collapseStartTime = null;
    // Don't reset startTime, just continue the rAF loop
    if (phase === 'fade-content') requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
}

// ================================================================
// DISMISS WIDGET
// ================================================================
function dismissWidget() {
  if (state !== 'widget') return;
  state = 'dismissing';
  ac.style.pointerEvents = 'none';

  const startTime = performance.now();
  const dur = 300 * timeScale;

  function tick(now) {
    const t = Math.min((now - startTime) / dur, 1);
    const e = easeOutCubic(t);

    ac.style.opacity = String(1 - e);
    ac.style.transform = `scale(${lerp(1, 0.7, e)}) translateY(${lerp(0, 30, e)}px)`;

    if (t >= 1) {
      ac.style.display = 'none';
      ac.style.cssText = '';
      ac.innerHTML = '';
      state = 'idle';
      return;
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ================================================================
// CONTROLS
// ================================================================
function replay() {
  resetAll();
  timeScale = 1;
  setTimeout(runAnimation, 150);
}

function replaySlow() {
  resetAll();
  timeScale = 5;
  setTimeout(runAnimation, 150);
}

function resetAll() {
  state = 'idle';
  ac.style.cssText = '';
  ac.innerHTML = '';
  ac.style.display = 'none';
}

// Auto-play on load
setTimeout(runAnimation, 800);
</script>
